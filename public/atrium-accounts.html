<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATRIUM — Accounts &amp; Settlement</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter+Tight:wght@500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
 --void:#050706;--carbon:#0A0D0C;--graphite:#12161A;--spacegrey:#1B2024;--steel:#292F33;--steel-2:#3A4146;--steel-3:#4C5559;
 --f-900:#0B2318;--f-800:#0F3123;--f-700:#14452F;--f-600:#1B5E3F;--f-500:#237A52;--f-400:#38996B;--f-300:#6FBE96;--f-100:#DCEDE4;--f-50:#F1F8F4;
 --sil-1:#EEF1F2;--sil-2:#C6CDCF;--sil-3:#9AA2A4;--sil-4:#6E7779;
 --amber:#C9A24B;--amber-bg:#F7EFD9;--amber-tx:#8A6D22;
 --red:#B4553F;--red-tx:#9A3F2C;--red-bg:#F6E7E2;
 --ink:#12150F;--ink-2:#3A3F3C;--mute:#636966;--faint:#7C8380;--line:#E1E4E3;--line-2:#EDEFEE;--grey-50:#F7F8F8;--grey-100:#F1F3F2;--grey-200:#E7EAE9;--grey-300:#D6DAD9;
 --disp:'Inter Tight',system-ui,sans-serif;--body:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--serif:'Cormorant Garamond',Georgia,serif;
 --ease:cubic-bezier(.32,.72,0,1);--r:12px;--r-m:16px;--r-l:22px;
 --sh-l:0 12px 34px -8px rgba(5,7,6,.45),0 46px 90px -26px rgba(5,7,6,.55);
 --brushed:linear-gradient(100deg,#DCE1E2,#F4F6F7 16%,#BDC5C7 40%,#EEF1F2 56%,#A6AEB0 80%,#DCE1E2);
 --sil-grad:linear-gradient(180deg,#F2F4F5,#C6CDCF 46%,#9AA2A4);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--void);color:var(--ink);font-family:var(--body);line-height:1.5;-webkit-font-smoothing:antialiased}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.neg{color:var(--red-tx)}
::selection{background:var(--f-500);color:#fff}
:focus-visible{outline:2px solid var(--f-400);outline-offset:2px;border-radius:6px}
.dev{display:inline-block;flex:0 0 auto}.dev svg{width:100%;display:block}
.sil-txt{background:var(--sil-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.carbon{background-color:#0b0f0e;
 background-image:linear-gradient(27deg,#1b2226 6px,transparent 6px) 0 6px,linear-gradient(207deg,#1b2226 6px,transparent 6px) 12px 0,
 linear-gradient(27deg,#0d1211 6px,transparent 6px) 0 12px,linear-gradient(207deg,#0d1211 6px,transparent 6px) 12px 6px,
 linear-gradient(90deg,#12181a 12px,transparent 12px),linear-gradient(#171e20 25%,#0e1413 25%,#0e1413 50%,transparent 50%,transparent 75%,#171e20 75%,#171e20);
 background-size:24px 24px}
.carbon-sheen{position:relative}
.carbon-sheen::after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(118deg,rgba(224,232,234,.10),transparent 34%,transparent 66%,rgba(224,232,234,.06));mix-blend-mode:screen}
.livery{display:inline-flex;align-items:center;height:5px;width:140px;border-radius:3px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.3)}
.livery .g{width:38px;height:100%;background:linear-gradient(180deg,var(--f-400),var(--f-700))}
.livery .s{flex:1;height:100%;background:var(--brushed)}

/* ============ APP FRAME ============ */
.app{display:grid;grid-template-rows:auto 1fr;height:100vh;overflow:hidden}
.topbar{position:relative;display:flex;align-items:center;gap:16px;padding:12px 22px;overflow:hidden;z-index:20;border-bottom:1px solid #000}
.topbar>*{position:relative;z-index:2}
.topbar .mk{display:flex;align-items:center;gap:11px}
.topbar .mk .bw{font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:.28em;padding-left:.28em}
.topbar .modlbl{font-family:var(--disp);font-weight:600;font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--sil-2);display:flex;align-items:center;gap:9px;padding-left:16px;margin-left:4px;border-left:1px solid var(--steel-2)}
.topbar .modlbl .n{color:var(--f-300)}
.topbar .partner{margin-left:auto;display:flex;align-items:center;gap:10px;font-family:var(--disp);font-weight:600;letter-spacing:.2em;text-transform:uppercase;font-size:10.5px;color:var(--sil-3)}
.topbar .partner .sep{width:1px;height:11px;background:var(--steel-2)}
/* entity switcher — unmissable */
.ent-switch{display:flex;align-items:center;gap:0;border:1px solid rgba(111,190,150,.34);border-radius:11px;overflow:hidden;background:rgba(35,122,82,.14);height:38px}
.ent-switch .el{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--f-300);padding:0 10px;align-self:center}
.ent-switch .ec{position:relative;display:flex;align-items:center;height:100%}
.ent-switch .ec i{width:7px;height:7px;border-radius:50%;background:var(--f-300);box-shadow:0 0 8px var(--f-400);margin:0 -2px 0 0;position:absolute;left:11px}
.ent-switch select{appearance:none;background:transparent;border:none;color:#fff;font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:.02em;padding:0 30px 0 26px;height:100%;cursor:pointer}
.ent-switch select:focus{outline:none}
.ent-switch .ec::after{content:"▾";position:absolute;right:11px;color:var(--sil-3);font-size:11px;pointer-events:none}
.ent-switch select option{background:#0d1211;color:#fff}
.savestate{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--sil-3);line-height:1;padding:5px 11px;border:1px solid var(--steel-2);border-radius:999px;background:rgba(255,255,255,.03)}
.savestate .sdot{width:7px;height:7px;border-radius:50%;background:var(--sil-4);flex-shrink:0}
.savestate.flash .sdot{background:var(--f-300,#6FBE96);animation:savepulse 1.1s ease-out}
@keyframes savepulse{0%{box-shadow:0 0 0 0 rgba(111,190,150,.55)}100%{box-shadow:0 0 0 8px rgba(111,190,150,0)}}

/* body grid */
.body{display:grid;grid-template-columns:236px 1fr;min-height:0;overflow:hidden}
/* forest rail */
.rail{position:relative;padding:20px 14px;display:flex;flex-direction:column;overflow-y:auto;background:linear-gradient(175deg,var(--f-800),var(--f-900) 74%,#050c08)}
.rail .cf{position:absolute;inset:0;z-index:0;opacity:.4}
.rail>*{position:relative;z-index:1}
.rail .brand{display:flex;align-items:center;gap:10px;padding:2px 8px 6px}
.rail .brand .bw{font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:.22em;color:#fff}
.rail .rdiv{height:3px;border-radius:2px;background:var(--brushed);margin:12px 8px 16px;opacity:.8}
.rgrp{font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(198,205,207,.42);margin:16px 12px 7px}
.rgrp:first-of-type{margin-top:4px}
.rnav{display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:9px;color:rgba(225,238,231,.74);font-size:13.5px;cursor:pointer;transition:.14s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;font-family:var(--body)}
.rnav:hover{background:rgba(255,255,255,.06);color:#fff}
.rnav.on{background:rgba(255,255,255,.1);color:#fff;font-weight:500;box-shadow:inset 3px 0 0 0 #C6CDCF}
.rnav .rc{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--f-300);opacity:.8}
.railfoot{margin-top:auto;padding:14px 10px 4px;border-top:1px solid rgba(198,205,207,.14);font-family:var(--mono);font-size:9.5px;color:rgba(198,205,207,.4);line-height:1.7}

/* work surface */
.main{background:var(--grey-100);overflow-y:auto;padding:26px 30px 60px}
.vhead{display:flex;align-items:flex-end;gap:16px;margin-bottom:6px;flex-wrap:wrap}
.vhead .vk{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--f-600)}
.vhead h1{font-family:var(--serif);font-weight:500;font-size:34px;letter-spacing:.01em;color:var(--ink);line-height:1.05;margin-top:3px}
.vhead .sp{margin-left:auto}
.vsub{color:var(--mute);font-size:13.5px;margin:2px 0 20px;max-width:74ch}
.livery.vl{margin:12px 0 22px}

/* cards / kpis */
.stat{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px}
.scard{position:relative;background:#fff;border-radius:var(--r-m);padding:18px 20px 16px;box-shadow:0 1px 2px rgba(5,7,6,.05),0 8px 20px -14px rgba(5,7,6,.16);overflow:hidden;min-width:0}
.scard .bz{position:absolute;top:0;left:0;right:0;height:3px;background:var(--brushed)}
.scard.forest{background:linear-gradient(160deg,var(--f-600),var(--f-800))}
.scard.forest .t,.scard.forest .v{color:#fff}
.scard .t{font-size:11.5px;color:var(--mute);letter-spacing:.02em}
.scard .v{font-family:var(--disp);font-weight:600;font-size:23px;letter-spacing:-.03em;color:var(--f-600);margin-top:7px;line-height:1.08;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scard .v.sm{font-size:17px}
.scard .d{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:5px}
.scard .v .neg{color:var(--red-tx)}

.card{background:#fff;border-radius:var(--r-m);padding:20px;box-shadow:0 1px 2px rgba(5,7,6,.05),0 6px 18px -14px rgba(5,7,6,.14);margin-bottom:16px;min-width:0;position:relative;overflow:hidden}
.card>.bz{position:absolute;top:0;left:0;right:0;height:3px;background:var(--brushed)}
.card h2{font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:.01em;color:var(--ink-2);margin-bottom:4px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.card h2 .tag{font-family:var(--mono);font-size:10px;font-weight:400;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}
.card .note{font-size:12px;color:var(--faint);margin-top:10px;line-height:1.55}
.card .note b{color:var(--f-600);font-weight:500}

/* tables */
.scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mute);font-weight:500;padding:8px 9px;border-bottom:2px solid var(--f-600);white-space:nowrap}
td{padding:8px 9px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
td.r,th.r{text-align:right}
td.mono,th.r{white-space:nowrap}
tbody tr:hover{background:var(--grey-50)}
tr.total td{border-top:2px solid var(--f-600);border-bottom:none;font-weight:600;background:var(--grey-50)}
tr.total:hover td{background:var(--grey-50)}
tr.sub td{background:var(--f-50);font-family:var(--disp);font-weight:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--f-700)}
.empty{padding:26px;text-align:center;color:var(--faint);font-size:13px}

/* forms */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
label{display:block;font-size:11px;font-weight:600;color:var(--mute);margin-bottom:4px;letter-spacing:.01em}
input,select,textarea{width:100%;font-family:var(--body);font-size:13px;color:var(--ink);padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:#fff}
input[type=number]{font-family:var(--mono)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--f-400);outline-offset:0;border-color:var(--f-400)}
.warn{color:var(--red-tx);font-size:12px;margin-left:8px}

/* buttons */
.btn{position:relative;height:38px;padding:0 16px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);font-family:var(--body);font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:transform .12s var(--ease),background .15s}
.btn:hover{background:var(--grey-50)}
.btn:active{transform:scale(.97)}
.btn.green{background:linear-gradient(180deg,var(--f-500),var(--f-700));color:#fff;border-color:rgba(0,0,0,.15);font-weight:600;box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 8px 20px -8px rgba(27,94,63,.5)}
.btn.green:hover{background:linear-gradient(180deg,var(--f-500),var(--f-600))}
.btn.sil{background:var(--brushed);color:#14181a;border:none;font-weight:600;box-shadow:inset 0 1px 0 rgba(255,255,255,.55)}
.btn.ghost{background:transparent}
.btn.danger{color:var(--red-tx);border-color:var(--red-bg)}
.btn.danger:hover{background:var(--red-bg)}
.btn.mini{height:28px;padding:0 10px;font-size:12px;border-radius:8px}
.btn.arm{background:var(--red);border-color:var(--red);color:#fff}

/* pills */
.pill{display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 11px;border-radius:100px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;font-weight:500;border:1px solid;white-space:nowrap}
.pill i{width:6px;height:6px;border-radius:50%}
.pill.live{border-color:rgba(35,122,82,.32);color:var(--f-600);background:var(--f-50)}
.pill.live i{background:var(--f-400);box-shadow:0 0 6px var(--f-400)}
.pill.hold{border-color:rgba(201,162,75,.4);color:var(--amber-tx);background:var(--amber-bg)}
.pill.hold i{background:var(--amber)}
.pill.loss{border-color:rgba(180,85,63,.36);color:var(--red-tx);background:var(--red-bg)}
.pill.loss i{background:var(--red)}
.pill.plain{border-color:var(--line);color:var(--mute);background:var(--grey-50)}
.pill.plain i{display:none}
.tagcls{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--sil-4)}

/* matrix */
.mx-wrap{overflow:auto;max-height:64vh;border:1px solid var(--line);border-radius:12px}
.mx{border-collapse:separate;border-spacing:0;font-size:12px;min-width:520px}
.mx th,.mx td{padding:6px 9px;border-bottom:1px solid var(--line);border-right:1px solid var(--line-2);white-space:nowrap}
.mx thead th{position:sticky;top:0;background:var(--grey-100);z-index:3;border-bottom:2px solid var(--f-600)}
.mx td:first-child,.mx th:first-child{position:sticky;left:0;background:#fff;z-index:2;font-weight:500;border-right:1px solid var(--line)}
.mx thead th:first-child{z-index:4;background:var(--grey-100)}
.mx td.amt{text-align:right;font-family:var(--mono)}
.mx td.cur{background:var(--f-50)!important}
.mx td.full{background:var(--f-50);color:var(--f-600);font-weight:600}
.mx td.inv{background:#EDF3EF;color:var(--f-700);font-weight:600}
.mx td.part{background:var(--amber-bg);color:var(--amber-tx);font-weight:600}
.mx td.miss{background:var(--red-bg);color:var(--red-tx);font-weight:600}
.mx tfoot td{position:sticky;background:var(--grey-100);font-weight:600;z-index:3}
.mx tfoot tr:first-child td{bottom:28px;border-top:2px solid var(--f-600)}
.mx tfoot tr:last-child td{bottom:0;color:var(--red-tx)}
.mx tfoot td:first-child{z-index:4}
.legend{display:flex;gap:15px;margin-top:11px;font-size:11.5px;color:var(--mute);flex-wrap:wrap}
.legend .sw{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:5px;border:1px solid var(--line)}
.check{display:inline-flex;padding:2px 9px;border-radius:6px;font-family:var(--mono);font-size:10.5px;font-weight:500;white-space:nowrap}
.check.ok{background:var(--f-50);color:var(--f-600)}
.check.bad{background:var(--red-bg);color:var(--red-tx)}
.check.over{background:#EDF3EF;color:var(--f-700)}
.check.uns{background:var(--amber-bg);color:var(--amber-tx)}

/* runway bar */
.runway{position:relative;height:14px;background:var(--grey-200);border-radius:7px;overflow:visible;margin-top:8px}
.runway .fill{position:absolute;inset:0 auto 0 0;background:linear-gradient(90deg,var(--f-500),var(--f-400));border-radius:7px}
.runway .fill.over{background:linear-gradient(90deg,var(--f-700),var(--f-600))}
.runway .marker{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--ink);opacity:.55}
.clientrow{padding:15px 0;border-bottom:1px solid var(--line)}
.clientrow:last-child{border-bottom:none}
.cr-top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.cr-top .nm{font-weight:600;font-size:14.5px;color:var(--ink)}
.cr-top .mg{color:var(--faint);font-size:12px}
.cr-fig{display:flex;gap:20px;flex-wrap:wrap;margin:7px 0 2px;font-size:12px;color:var(--mute)}
.cr-fig b{color:var(--ink)}
.ahead{color:var(--f-600);font-weight:600}.behind{color:var(--red-tx);font-weight:600}

/* diagram */
.diagram svg{width:100%;height:auto}
.flow{stroke-dasharray:6 5;animation:flow 1.7s linear infinite}
@keyframes flow{to{stroke-dashoffset:-22}}
@media(prefers-reduced-motion:reduce){.flow{animation:none}}

/* toast + modal */
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--carbon);color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 10px 30px rgba(5,7,6,.4);opacity:0;pointer-events:none;transition:opacity .25s;z-index:200;max-width:88vw;text-align:center;border:1px solid var(--steel-2)}
#toast.show{opacity:1}
#toast .tk{color:var(--f-300);font-family:var(--mono);margin-right:8px}
.overlay{position:fixed;inset:0;background:rgba(5,7,6,.6);backdrop-filter:blur(4px);display:none;align-items:flex-start;justify-content:center;padding:44px 16px;overflow:auto;z-index:150}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--r-l);max-width:720px;width:100%;padding:4px;background:var(--brushed);box-shadow:var(--sh-l)}
.modal .inner{background:#fff;border-radius:19px;padding:24px}
.modal h3{font-family:var(--serif);font-weight:500;font-size:24px;margin-bottom:16px;color:var(--ink)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
.modal .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.warnbanner{background:var(--red-bg);color:var(--red-tx);border-radius:9px;padding:9px 12px;font-size:12.5px;margin-bottom:12px;display:none}
.custom-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:8px;max-height:240px;overflow:auto;padding:2px}
.custom-grid .cg label{font-family:var(--mono);font-size:10px;color:var(--faint)}
.total-preview{margin-top:10px;font-size:13px;color:var(--mute)}
.total-preview b{font-family:var(--disp);font-weight:600;font-size:18px;color:var(--f-600);letter-spacing:-.02em}

@media(max-width:1080px){.body{grid-template-columns:1fr}.rail{display:none}.topbar .modlbl{display:none}}
@media(max-width:600px){.main{padding:18px 15px 50px}.grid2{grid-template-columns:1fr}.topbar{flex-wrap:wrap;gap:10px}.topbar .partner{display:none}.vhead h1{font-size:26px}}
.stat>*,.grid>*,.grid2>*{min-width:0}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
<style id="atrium-reskin-v2">
/* ── ATRIUM Book 02 re-skin (CSS only — Dom's JS/logic untouched) ──────────────
   Light by default with a dark toggle. Chrome (topbar + rail) stays dark in
   both themes. Most of the app reskins by remapping Dom's own tokens to the new
   palette (172 var() refs); the few hardcoded backgrounds are patched to glass. */
:root{ --cx:#131b26;--cx2:#0f1620;--cx-line:rgba(255,255,255,.09);--cx-txt:#e8edf1;--cx-dim:#9aa7b2;--cx-faint:#6c7a88;--sil-hi:#cdd8e2; }

/* content tokens — LIGHT (default) */
body:not(.atr-dark){
  --ink:#232c37;--ink-2:#5b6672;--mute:#8592a0;--faint:#a6b2be;
  --line:rgba(35,44,55,.12);--line-2:rgba(35,44,55,.07);
  --grey-50:#eef3f8;--grey-100:#e7edf5;--grey-200:#dde5ef;
  --f-700:#1b5e3f;--f-600:#237a52;--f-500:#2f9e6b;--f-400:#38996b;--f-300:#6fbe96;--f-100:#dcede4;--f-50:#eef7f2;

/* -- shared expenses / settlement (from Group Settlement System) -- */
function ratioOf(name){ const r=state.settings.ratios; if(name===CO.HM)return r.hm/100; if(name===CO.HT)return r.ht/100; if(name===CO.SEV)return r.sev/100; return 0; }
const isGstFree = cat => /payroll/i.test(cat||'');
function expenseMonths(){ return [...new Set(state.expenses.map(e=>monthOf(e.date)))].filter(Boolean).sort().reverse(); }
function expenseSummary(list,setts){
 list=list||state.expenses; setts=setts||state.settlements;
 const cos=[CO.HM,CO.HT,CO.SEV,CO.PARENT]; const sum={}; cos.forEach(c=>sum[c]={share:0,paid:0,sOut:0,sIn:0}); let total=0;
 list.forEach(e=>{ total+=e.amount; [CO.HM,CO.HT,CO.SEV].forEach(c=>sum[c].share+=e.amount*ratioOf(c)); if(sum[e.payer])sum[e.payer].paid+=e.amount; });
 setts.forEach(s=>{ if(sum[s.from])sum[s.from].sOut+=s.amount; if(sum[s.to])sum[s.to].sIn+=s.amount; });
 cos.forEach(c=>sum[c].net=sum[c].paid+sum[c].sOut-sum[c].share-sum[c].sIn);
 return {sum,total,cos};
}
function rechargeMatrix(list){
 const cos=[CO.HM,CO.HT,CO.SEV,CO.PARENT]; const m={}; cos.forEach(a=>{m[a]={};cos.forEach(b=>m[a][b]=0);});
 list.forEach(e=>{ if(!m[e.payer])return; [CO.HM,CO.HT,CO.SEV].forEach(c=>{ if(c!==e.payer) m[e.payer][c]+=e.amount*ratioOf(c); }); });
 return m;
}
function cutoffDate(){ return state.settings.cutoff||todayStr(); }
function dayDiff(a,b){ return Math.max(0,Math.round((new Date(b)-new Date(a))/864e5)); }
function loanCalc(){
 const rate=state.settings.rate/100, basis=state.settings.basis||365, cut=cutoffDate();
 const txns=[...state.loans].sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
 const bal={[CO.HM]:0,[CO.HT]:0,[CO.HPI]:0}; const int={[CO.HM]:0,[CO.HT]:0,[CO.HPI]:0}; const rows=[];
 txns.forEach((t,i)=>{
  bal[t.company]+=(t.type==='Drawdown'?1:-1)*t.amount;
  const days=i+1<txns.length?dayDiff(t.date,txns[i+1].date):dayDiff(t.date,cut);
  BORROWERS.forEach(c=>int[c]+=bal[c]*rate/basis*days);
  rows.push({...t,balAfter:{...bal},days});
 });
 return {rows,bal,int,totalBal:BORROWERS.reduce((s,c)=>s+bal[c],0),totalInt:BORROWERS.reduce((s,c)=>s+int[c],0)};
}
function filteredSettlements(){
 if(ui.expMonth==='all') return state.settlements;
 return state.settlements.filter(s=>{ if(monthOf(s.date)===ui.expMonth) return true;
  if(s.invoiceId){ const i=state.groupInvoices.find(x=>x.id===s.invoiceId); if(i&&i.month===ui.expMonth) return true; } return false; });
}
function statusOf(net){ return net>0.05?'To be reimbursed':net<-0.05?'Owes the pool':'Settled'; }
function showInSettlement(c,sum){ if(c!==CO.PARENT) return true; const s=sum[c]; return Math.abs(s.paid)>0.005||Math.abs(s.sOut)>0.005||Math.abs(s.sIn)>0.005; }
function invoiceCategoryLines(a,b,scope,useNet,targetAmount){
 const list=state.expenses.filter(e=>scope==='all'||monthOf(e.date)===scope);
 const cats=[...new Set(list.map(e=>e.category))]; let raw=[];
 cats.forEach(cat=>{ const Mx=rechargeMatrix(list.filter(e=>e.category===cat)); const amt=useNet?(Mx[a][b]-Mx[b][a]):Mx[a][b]; if(Math.abs(amt)>0.005) raw.push({category:cat,amount:amt,bas:isGstFree(cat)}); });
 const rawTotal=raw.reduce((t,l)=>t+l.amount,0); if(rawTotal<=0.005) return [];
 const scale=targetAmount/rawTotal; raw=raw.map(l=>({...l,amount:+(l.amount*scale).toFixed(2)}));
 const diff=+(targetAmount-raw.reduce((t,l)=>t+l.amount,0)).toFixed(2);
 if(Math.abs(diff)>=0.01){ const big=raw.reduce((m,l)=>Math.abs(l.amount)>Math.abs(m.amount)?l:m,raw[0]); big.amount=+(big.amount+diff).toFixed(2); }
 return raw;
}

  if(c.feeType==='monthly') amt=Number(c.monthlyAmount)||0;
  else if(c.feeType==='fixed') amt=(Number(c.fixedTotal)||0)/c.months;
  else amt=Number((c.customAmounts||{})[ym])||0;
  out.push({month:ym,amount:amt}); } return out; }

function profitData(){ const revMap=revenueByClientMonth(); const byClient={};
 const rows=Object.keys(revMap).sort().map(ym=>{ const rev=revMap[ym]; let totalRev=0,haavn=0;
  Object.entries(rev).forEach(([cid,r])=>{ const cl=state.clients.find(x=>x.id===cid); const share=cl?haavnRate(cl):0; totalRev+=r; haavn+=r*share; const b=byClient[cid]=byClient[cid]||{rev:0,haavn:0}; b.rev+=r; b.haavn+=r*share; });
  return {ym,totalRev,haavn,m2:totalRev-haavn}; });
 return {rows,byClient}; }
function billingData(){ const ym=ui.billMonth||currentYM();
 return state.clients.filter(c=>ui.billPipeline||c.status==='Committed').map(c=>{ const sched=scheduledInMonth(c,ym); const inv=invoicedInMonth(c.id,ym); return {c,sched,inv,variance:inv-sched}; }).filter(r=>r.sched>0||r.inv>0).sort((a,b)=>a.c.name.localeCompare(b.c.name)); }
function checkBadge(r){ const eps=0.005;
 if(r.sched>0&&Math.abs(r.variance)<=eps) return '<span class="check ok">✓ Correct</span>';
 if(r.sched>0&&r.inv===0) return '<span class="check bad">Not invoiced</span>';
 if(r.variance<-eps) return `<span class="check bad">Short ${fmt(-r.variance)}</span>`;
 if(r.sched===0&&r.inv>eps) return '<span class="check uns">Unscheduled</span>';
 return `<span class="check over">Over ${fmt(r.variance)}</span>`; }
function matrixClients(){ return state.clients.filter(c=>(!ui.mxStatus||c.status===ui.mxStatus)&&(!ui.mxManager||c.m1===ui.mxManager||c.m2===ui.mxManager)).sort((a,b)=>a.name.localeCompare(b.name)); }
function matrixMonths(list){ let min=null,max=null; list.forEach(c=>{ if(!c.startMonth||!c.months)return; const e=addMonths(c.startMonth,c.months-1); if(!min||c.startMonth<min)min=c.startMonth; if(!max||e>max)max=e; }); if(!min)return []; const out=[]; let m=min; while(m<=max&&out.length<72){ out.push(m); m=addMonths(m,1); } return out; }

  if(r.sched>0&&Math.abs(r.variance)<=eps)ok++;else iss++;

 </div></div>
 <div class="stat">
  <div class="scard"><div class="bz"></div><div class="t">Scheduled — ${monthLabel(ym)}</div><div class="v">${fmt0(tS)}</div></div>
  <div class="scard"><div class="bz"></div><div class="t">Invoiced</div><div class="v">${fmt0(tI)}</div></div>

function billActionCell(r){ const eps=0.005, ym=ui.billMonth||currentYM(); const short=r.sched-r.inv;
 if(short>eps) return `<input id="xno-${r.c.id}" placeholder="Xero #" style="width:92px;height:30px;padding:0 8px;font-size:12px;display:inline-block"><button class="btn mini green" onclick="markInvoiced('${r.c.id}')">✓ ${fmt0(short)}</button>`;
 const quick=state.clientInvoices.filter(i=>i.clientId===r.c.id&&i.quick&&i.date.slice(0,7)===ym);
 if(quick.length) return `<button class="btn mini ghost" onclick="undoInvoiced('${r.c.id}')">Undo</button>`;
 return '<span class="mg">—</span>'; }
function billPaidCell(r){ const ym=ui.billMonth||currentYM(); const invs=monthInvoices(r.c.id,ym); if(!invs.length) return '<span class="mg">—</span>';
 const unpaid=invs.filter(i=>!i.paidDate), today=todayStr();
 if(!unpaid.length){ const d=invs.map(i=>i.paidDate).sort().slice(-1)[0]; return `<span class="pill live"><i></i>Paid ${d}</span> <button class="btn mini ghost" onclick="unpayMonth('${r.c.id}')">Undo</button>`; }
 const days=Math.floor((new Date(today)-new Date(invs[0].date))/864e5), amt=unpaid.reduce((s,i)=>s+i.amount,0);
 return `<span class="pill hold"><i></i>Outstanding${days>30?' '+days+'d':''}</span> <input type="date" id="pdm-${r.c.id}" value="${today}" style="width:130px;height:30px;padding:0 6px;font-size:12px;display:inline-block"><button class="btn mini green" onclick="payMonth('${r.c.id}')">✓ ${fmt0(amt)}</button>`; }

/* ============ SCHEDULE MATRIX ============ */
VIEWS.schedule=function(){
 const list=matrixClients(), months=matrixMonths(list), cur=currentYM(), mgrs=managerList();
 let table;
 if(!list.length||!months.length){ table='<div class="empty">No clients match.</div>'; }
 else{
  const colT=months.map(()=>0), colU=months.map(()=>0);
  let head2=`<thead><tr><th>Client</th>${months.map(m=>`<th class="amt ${m===cur?'cur':''}">${monthLabel(m).replace(' ','<br>')}</th>`).join('')}<th class="amt">Total</th></tr></thead>`;
  let body='<tbody>';
  list.forEach(c=>{ const sched={}; scheduleFor(c).forEach(x=>sched[x.month]=(sched[x.month]||0)+x.amount); let rt=0;
   body+=`<tr><td>${esc(c.name)}</td>`;
   months.forEach((m,idx)=>{ const s=sched[m]||0; rt+=s; colT[idx]+=s; let cls=m===cur?'cur ':'';
    if(s>0.005){ const invs=monthInvoices(c.id,m); const inv=invs.reduce((t,i)=>t+(Number(i.amount)||0),0); const paid=invs.filter(i=>i.paidDate).reduce((t,i)=>t+(Number(i.amount)||0),0); colU[idx]+=Math.max(0,inv-paid);
     if(inv>=s-0.005) cls+=(paid>=inv-0.005)?'full':'inv'; else if(inv>0.005) cls+='part'; else if(m<cur) cls+='miss'; }
    body+=`<td class="amt ${cls}">${num0(s)}</td>`; });
   body+=`<td class="amt"><b>${num0(rt)}</b></td></tr>`; });
  body+='</tbody>';
  const grand=bsum(colT), gu=bsum(colU);
  const foot=`<tfoot><tr><td>Total scheduled</td>${colT.map((t,i)=>`<td class="amt ${months[i]===cur?'cur':''}">${num0(t)}</td>`).join('')}<td class="amt">${num0(grand)}</td></tr>
   <tr><td>Unpaid (invoiced)</td>${colU.map((t,i)=>`<td class="amt ${months[i]===cur?'cur':''}">${num0(t)}</td>`).join('')}<td class="amt">${num0(gu)}</td></tr></tfoot>`;
  table=`<div class="mx-wrap"><table class="mx">${head2}${body}${foot}</table></div>
   <div class="legend"><span><span class="sw" style="background:var(--f-50)"></span>Invoiced &amp; paid</span><span><span class="sw" style="background:#EDF3EF"></span>Invoiced, awaiting</span><span><span class="sw" style="background:var(--amber-bg)"></span>Partial</span><span><span class="sw" style="background:var(--red-bg)"></span>Due &amp; not invoiced</span><span><span class="sw" style="background:var(--f-50)"></span>Current month</span></div>`;
 }
 return head('Client revenue','Billing schedule matrix',`Every client's contracted billing across the year, coloured by invoice and payment status.`,
   `<button class="btn" onclick="exportMatrix()">Export CSV</button>`)+`
 <div class="card"><div class="bz"></div><h2>Filters</h2><div class="grid" style="max-width:420px">
   <div><label>Status</label><select onchange="setUi('mxStatus',this.value)"><option value=""${ui.mxStatus===''?' selected':''}>All</option>${['Committed','Pipeline'].map(o=>`<option${ui.mxStatus===o?' selected':''}>${o}</option>`).join('')}</select></div>
   <div><label>Manager</label><select onchange="setUi('mxManager',this.value)"><option value="">All</option>${mgrs.map(m=>`<option${ui.mxManager===m?' selected':''}>${esc(m)}</option>`).join('')}</select></div>
 </div></div>
 <div class="card"><div class="bz"></div><h2>Matrix</h2>${table}</div>`;
};

   <tr class="total"><td colspan="3">Accrued interest</td><td></td><td class="r">${money(L.int[CO.HM])}</td><td class="r">${money(L.int[CO.HT])}</td><td class="r">${money(L.int[CO.HPI])}</td><td colspan="2" class="r">Total ${fmt0(L.totalInt)}</td></tr></table>`:'<div class="empty">No loan entries yet.</div>'}</div></div>`;

/* ============ INTER-CO INVOICING ============ */
VIEWS.interco=function(){
 const months=expenseMonths();
 const list=state.expenses.filter(e=>ui.icMonth==='all'||monthOf(e.date)===ui.icMonth);
 const M=rechargeMatrix(list); const cos=[CO.HM,CO.HT,CO.SEV]; const short=c=>({[CO.HM]:'HM',[CO.HT]:'HT',[CO.SEV]:'7even'})[c];
 const comb=(a,b)=>a===b?0:(ui.icNet?Math.max(0,M[a][b]-M[b][a]):M[a][b]);
 const invoicedTotal=(a,b)=>state.groupInvoices.filter(i=>i.from===a&&i.to===b).reduce((t,i)=>t+(i.rechargeAmt!==undefined?i.rechargeAmt:i.amount),0);
 const monthsAsc=[...new Set(state.expenses.map(e=>monthOf(e.date)))].filter(Boolean).sort(); const monthM={};
 monthsAsc.forEach(mo=>monthM[mo]=rechargeMatrix(state.expenses.filter(e=>monthOf(e.date)===mo)));
 const combOf=(Mx,a,b)=>a===b?0:(ui.icNet?Math.max(0,Mx[a][b]-Mx[b][a]):Mx[a][b]);
 const remaining=(a,b)=>{ if(a===b)return 0; const I=invoicedTotal(a,b); if(ui.icMonth==='all') return Math.max(0,comb(a,b)-I); const prior=monthsAsc.filter(mo=>mo<ui.icMonth).reduce((t,mo)=>t+combOf(monthM[mo],a,b),0); const g=comb(a,b); const covered=Math.min(Math.max(I-prior,0),g); return g-covered; };
 ui.icLines=[];
 const cell=(a,b)=>{ const gross=comb(a,b); if(a===b||gross<=0.005) return '<td class="amt" style="vertical-align:top">—</td>'; const rem=remaining(a,b); const invd=gross-rem;
  if(rem<=0.005) return `<td class="amt" style="vertical-align:top"><span class="pill live"><i></i>Invoiced</span><br><span class="mg" style="font-size:10px">${fmt0(gross)} covered</span></td>`;
  const desc=(ui.icNet?'Net recharge of shared expenses ('+a+' paid, less '+b+')':'Recharge of shared expenses paid by '+a)+(ui.icMonth==='all'?'':' — '+monthLabel(ui.icMonth));
  const idx=ui.icLines.push({from:a,to:b,amount:rem,rechargeAmt:rem,desc,scope:ui.icMonth,useNet:ui.icNet})-1;
  return `<td class="amt" style="vertical-align:top">${money(rem)}${ui.icMonth==='all'&&invd>0.005?`<br><span class="mg" style="font-size:10px">of ${fmt0(gross)} — ${fmt0(invd)} invoiced</span>`:''}<br><button class="btn mini ghost" onclick="createGroupInvoice(${idx})">+ Invoice</button></td>`; };
 const matrixRows=cos.map(a=>{ const rt=cos.reduce((t,b)=>t+remaining(a,b),0); return `<tr><td style="vertical-align:top"><b>${short(a)}</b> →</td>${cos.map(b=>cell(a,b)).join('')}<td class="amt" style="vertical-align:top"><b>${rt>0.005?fmt0(rt):'—'}</b></td></tr>`; }).join('');
 const colT=cos.map(b=>cos.reduce((t,a)=>t+remaining(a,b),0));
 const invRows=[...state.groupInvoices].sort((a,b)=>b.id-a.id).map(inv=>{ const linked=state.settlements.some(s=>s.invoiceId===inv.id);
  const act=inv.status==='To send'?`<button class="btn mini green" onclick="markGroupSent(${inv.id})">Mark sent</button> `:inv.status==='Invoice sent'?`<button class="btn mini green" onclick="markGroupPaid(${inv.id})">Payment received</button> `:'';
  const pill=inv.status==='To send'?'<span class="pill plain"><i></i>To send</span>':inv.status==='Invoice sent'?'<span class="pill hold"><i></i>Sent</span>':'<span class="pill live"><i></i>Settled</span>';
  const main=`<tr><td class="mono">${esc(inv.number)}</td><td class="mono">${inv.created}</td><td>${esc(inv.from)}</td><td>${esc(inv.to)}</td><td class="r">${money(inv.amount)}</td><td style="font-size:12px">${esc(inv.desc)}</td><td>${pill}</td><td style="white-space:nowrap"><button class="btn mini ghost" onclick="toggleGroupLines(${inv.id})">${ui.expandedInvoice===inv.id?'Hide':'Lines'}</button> ${act}<button class="btn mini danger" onclick="delGroupInvoice(${inv.id})">Delete</button></td></tr>`;
  if(ui.expandedInvoice!==inv.id) return main;
  const lineRows=(inv.lines&&inv.lines.length)?inv.lines.map(li=>`<tr><td>${esc(li.category)}</td><td>${li.bas?'<span class="pill plain">BAS Excl</span>':'GST on Income'}</td><td class="r">${money(li.amount)}</td></tr>`).join('')+`<tr class="total"><td>Total</td><td></td><td class="r">${money(inv.lines.reduce((t,li)=>t+li.amount,0))}</td></tr>`:'<tr><td colspan="3" class="empty">No line breakdown.</td></tr>';
  return main+`<tr><td colspan="8" style="background:var(--f-50);padding:10px 14px"><b style="font-size:12px;color:var(--f-700)">Invoice lines — by Xero account</b><table style="max-width:520px;margin-top:6px"><tr><th>Account</th><th>Tax code</th><th class="r">Amount</th></tr>${lineRows}</table></td></tr>`; }).join('');
 const monthOpts=`<option value="all"${ui.icMonth==='all'?' selected':''}>All months</option>`+months.map(m=>`<option value="${m}"${ui.icMonth===m?' selected':''}>${monthLabel(m)}</option>`).join('');
 return head('Group settlement','Inter-company invoicing','What each entity should bill the others for shared costs. Haavn Parent is excluded — loan interest runs through the loan account, not invoices.')+`
 <div class="card"><div class="bz"></div><h2>Basis</h2><div class="grid" style="max-width:560px">
   <div><label>Expense month</label><select onchange="setUi('icMonth',this.value)">${monthOpts}</select></div>
   <div><label>Invoicing basis</label><select onchange="setIcNet(this.value)"><option value="net"${ui.icNet?' selected':''}>One net invoice per pair</option><option value="gross"${ui.icNet?'':' selected'}>Gross (each payer separately)</option></select></div>
 </div></div>
 <div class="card"><div class="bz"></div><h2>Invoice matrix <span class="tag">${ui.icNet?'netted':'gross'} · already-invoiced cleared</span></h2><div class="scroll"><table class="mx" style="min-width:0">
   <tr><th></th>${cos.map(b=>`<th class="amt">to ${short(b)}</th>`).join('')}<th class="amt">To issue</th></tr>${matrixRows}
   <tr class="total"><td>To receive</td>${colT.map(t=>`<td class="amt">${t>0.005?fmt0(t):'—'}</td>`).join('')}<td class="amt">${fmt0(bsum(colT))}</td></tr>
 </table></div><div class="note">Cells show what is still left to invoice. Every invoice clears its amount from all views; oldest month is covered first.</div></div>
 <div class="card"><div class="bz"></div><h2>Invoice register <span class="tag">To send → Sent → Settled</span></h2><div class="scroll">${state.groupInvoices.length?`<table><tr><th>No.</th><th>Created</th><th>From</th><th>To</th><th class="r">Amount</th><th>Description</th><th>Status</th><th></th></tr>${invRows}</table>`:'<div class="empty">No inter-co invoices yet — click "+ Invoice" above.</div>'}</div><div class="note">"Payment received" records a settlement automatically, so the entity’s status updates to Settled.</div></div>`;
};

/* ============ BUDGET — HAAVN BOOK ============ */
function budgetTable(rowsHtml,footHtml){ return `<div class="scroll"><table class="mx" style="min-width:820px"><thead><tr><th>Line item</th>${BMONTHS.map(m=>`<th class="amt">${m}</th>`).join('')}<th class="amt">FY27</th></tr></thead><tbody>${rowsHtml}</tbody>${footHtml?`<tfoot>${footHtml}</tfoot>`:''}</table></div>`; }
function budRow(label,vals,cls){ const tot=bsum(vals); return `<tr class="${cls||''}"><td>${label}</td>${vals.map(v=>`<td class="amt">${v?money(v,0):'<span class="mg">—</span>'}</td>`).join('')}<td class="amt"><b>${money(tot,0)}</b></td></tr>`; }

VIEWS.mgranalysis=function(){
 const subhdr=lbl=>`<tr class="sub"><td colspan="${BMONTHS.length+2}">${lbl}</td></tr>`;
 const blocks=BUDGET.managers.map(m=>{ const wages=BMONTHS.map(()=>m.wage); const net=m.rev.map((r,i)=>r-wages[i]); const tRev=bsum(m.rev), tW=bsum(wages);
  return subhdr(esc(m.k))
   + budRow('Revenue (committed)',m.rev)
   + budRow('Wages + super',wages)
   + budRow('Net contribution',net,'total')
   + `<tr><td>Revenue ÷ cost</td>${m.rev.map((r,i)=>`<td class="amt mono">${wages[i]?(r/wages[i]).toFixed(2):'—'}</td>`).join('')}<td class="amt mono"><b>${tW?(tRev/tW).toFixed(2):'—'}</b></td></tr>`; }).join('');
 const totRev=BMONTHS.map((_,i)=>bsum(BUDGET.managers.map(m=>m.rev[i])));
 const totWage=BMONTHS.map((_,i)=>bsum(BUDGET.managers.map(m=>m.wage)));
 const totNet=totRev.map((r,i)=>r-totWage[i]);
 const totals=subhdr('All managers — total')+budRow('Total revenue (committed)',totRev)+budRow('Total wages + super',totWage)+budRow('Total net contribution',totNet,'total');
 return head('FY27 budget','Manager analysis',`Committed revenue vs wages + super for each fee-earning manager. Shared staff (Admin, Accounts, Daniel Sette) are excluded.`)+`
 <div class="stat" style="grid-template-columns:repeat(4,1fr)">
  ${BUDGET.managers.map(m=>{ const net=bsum(m.rev)-m.wage*12; return `<div class="scard"><div class="bz"></div><div class="t">${esc(m.k)}</div><div class="v sm"><span class="${net<0?'neg':''}">${fmt0(net)}</span></div><div class="d">net · rev ÷ cost ${(bsum(m.rev)/(m.wage*12)).toFixed(2)}</div></div>`; }).join('')}
 </div>
 <div class="card"><div class="bz"></div><h2>By manager <span class="tag">FY27 plan</span></h2>${budgetTable(blocks+totals)}
   <div class="note">Managers below a 1.0 revenue ÷ cost ratio are running at a net cost this year — visible in loss red.</div></div>`;
};

/* ============ ACTIONS ============ */
function setUi(k,v){ ui[k]=v; render(); }
function setBillMonth(v){ ui.billMonth=v; render(); }
function billStep(d){ ui.billMonth=addMonths(ui.billMonth||currentYM(),d); render(); }
function setIcNet(v){ ui.icNet=(v==='net'); render(); }

/* -- shared expenses -- */
function addExpense(){ const date=$('eDate').value, amount=parseFloat($('eAmt').value), w=$('eWarn');
 if(!date||!(amount>0)){ w.textContent=' Enter a date and amount > 0'; return; }
 state.expenses.push({id:state.nextId++,date,category:$('eCat').value.trim()||'Uncategorised',desc:$('eDesc').value.trim(),amount,payer:$('ePayer').value}); save(); render(); toast('Expense added'); }
function delExpense(id){ state.expenses=state.expenses.filter(e=>e.id!==id); if(ui.editingExpenseId===id)ui.editingExpenseId=null; save(); render(); }
function startEditExpense(id){ ui.editingExpenseId=id; render(); }
function cancelEditExpense(){ ui.editingExpenseId=null; render(); }
function saveEditExpense(id){ const e=state.expenses.find(x=>x.id===id); if(!e)return; const date=$('exDate').value, amount=parseFloat($('exAmt').value), w=$('exWarn');
 if(!date||!(amount>0)){ w.textContent=' Date + amount > 0'; return; }
 e.date=date; e.category=$('exCat').value.trim()||'Uncategorised'; e.desc=$('exDesc').value.trim(); e.amount=amount; e.payer=$('exPayer').value; ui.editingExpenseId=null; save(); render(); toast('Expense updated'); }
function addSettlement(){ const date=$('pDate').value, from=$('pFrom').value, to=$('pTo').value, amount=parseFloat($('pAmt').value), w=$('pWarn');
 if(!date||!(amount>0)){ w.textContent=' Enter a date and amount > 0'; return; }
 if(from===to){ w.textContent=' Payer and receiver must differ'; return; }
 state.settlements.push({id:state.nextId++,date,from,to,amount}); save(); render(); toast('Settlement recorded'); }
function delSettlement(id){ const s=state.settlements.find(x=>x.id===id); state.settlements=state.settlements.filter(x=>x.id!==id);
 if(s&&s.invoiceId){ const i=state.groupInvoices.find(x=>x.id===s.invoiceId); if(i&&i.status==='Settled')i.status='Invoice sent'; } save(); render(); }

/* -- loans -- */
function addLoan(){ const date=$('lDate').value, amount=parseFloat($('lAmt').value), w=$('lWarn');
 if(!date||!(amount>0)){ w.textContent=' Enter a date and amount > 0'; return; }
 state.loans.push({id:state.nextId++,date,company:$('lCo').value,type:$('lType').value,amount}); save(); render(); toast('Loan entry added'); }
function delLoan(id){ state.loans=state.loans.filter(l=>l.id!==id); save(); render(); }

/* -- inter-co invoices -- */
function createGroupInvoice(idx){ const l=ui.icLines[idx]; if(!l)return; const nid=state.nextId++;
 const lines=invoiceCategoryLines(l.from,l.to,l.scope,l.useNet,+l.amount.toFixed(2));
 state.groupInvoices.push({id:nid,number:'GRP-'+String(nid).slice(-3).padStart(3,'0'),created:todayStr(),month:ui.icMonth,from:l.from,to:l.to,amount:+l.amount.toFixed(2),rechargeAmt:+l.amount.toFixed(2),desc:l.desc,lines,status:'To send'});
 ui.expandedInvoice=nid; save(); render(); toast('Inter-co invoice created'); }
function markGroupSent(id){ const i=state.groupInvoices.find(x=>x.id===id); if(i){ i.status='Invoice sent'; save(); render(); } }
function markGroupPaid(id){ const i=state.groupInvoices.find(x=>x.id===id); if(!i)return; i.status='Settled'; i.paidDate=todayStr();
 const rech=i.rechargeAmt!==undefined?i.rechargeAmt:i.amount; if(rech>0.005) state.settlements.push({id:state.nextId++,date:todayStr(),from:i.to,to:i.from,amount:rech,invoiceId:i.id}); save(); render(); toast('Payment recorded + settled'); }
function toggleGroupLines(id){ ui.expandedInvoice=ui.expandedInvoice===id?null:id; render(); }
function delGroupInvoice(id){ state.groupInvoices=state.groupInvoices.filter(x=>x.id!==id); state.settlements=state.settlements.filter(s=>s.invoiceId!==id); save(); render(); }

/* -- client invoices -- */
function addInvoice(){ const date=$('invDate').value, clientId=$('invClient').value, invNo=$('invNo').value.trim(), amount=Number($('invAmount').value)||0, notes=$('invNotes').value.trim(), msg=$('invMsg');
 if(!date||!clientId||!invNo||!amount){ msg.textContent=' Date, client, invoice # and amount are required.'; return; }
 const dup=state.clientInvoices.some(i=>i.invNo.toLowerCase()===invNo.toLowerCase());
 if(dup&&ui._pendingDup!==invNo.toLowerCase()){ ui._pendingDup=invNo.toLowerCase(); msg.textContent=' That invoice # already exists. Click "Add invoice" again to record anyway.'; return; }
 ui._pendingDup=null; state.clientInvoices.push({id:uid(),date,clientId,invNo,amount,notes}); save(); render(); toast('Invoice '+invNo+' added'); }
function delInvoice(id,ev){ armConfirm(ev.target,()=>{ const inv=state.clientInvoices.find(i=>i.id===id); state.clientInvoices=state.clientInvoices.filter(i=>i.id!==id); save(); render(); toast('Invoice deleted'); }); }

/* -- billing run -- */
function markInvoiced(clientId){ const ym=ui.billMonth||currentYM(); const c=state.clients.find(x=>x.id===clientId);
 const amount=Math.round((scheduledInMonth(c,ym)-invoicedInMonth(clientId,ym))*100)/100; if(amount<=0)return;
 let invNo=($('xno-'+clientId)||{}).value; invNo=invNo&&invNo.trim();
 if(!invNo){ const n=state.clientInvoices.filter(i=>i.invNo.startsWith('XERO-'+ym)).length+1; invNo=`XERO-${ym}-${String(n).padStart(2,'0')}`; }
 const today=todayStr(); const date=today.slice(0,7)===ym?today:ym+'-01';
 state.clientInvoices.push({id:uid(),date,clientId,invNo,amount,notes:'Issued in Xero (from billing run)',quick:true}); save(); render(); toast(c.name+': '+fmt0(amount)+' invoiced ('+invNo+')'); }
function undoInvoiced(clientId){ const ym=ui.billMonth||currentYM(); state.clientInvoices=state.clientInvoices.filter(i=>!(i.clientId===clientId&&i.quick&&i.date.slice(0,7)===ym)); save(); render(); }
function payMonth(clientId){ const ym=ui.billMonth||currentYM(); const c=state.clients.find(x=>x.id===clientId); const d=($('pdm-'+clientId)||{}).value||todayStr(); let amt=0;
 monthInvoices(clientId,ym).forEach(i=>{ if(!i.paidDate){ i.paidDate=d; amt+=i.amount; } }); save(); render(); toast(c.name+': '+fmt0(amt)+' marked paid'); }

/* ---------- shared cloud sync (Supabase capital_kv → all staff, live) ---------- */
/* Same backend the rest of Capital Base uses: one JSON blob per module in the
   capital_kv table, cloud-wins-on-open, fire-and-forget push on save, realtime
   fan-out to every browser. Non-blocking and fully optional — the app renders
   from localStorage first and still runs offline; if the SDK can't load we just
   stay local. */
const CLOUD_URL='https://vgvavmnqrdgcnledztyk.supabase.co';
const CLOUD_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZndmF2bW5xcmRnY25sZWR6dHlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NzIwODEsImV4cCI6MjA5OTU0ODA4MX0.hiWSzfEMXPJGs67iqiuB3hwJVxUO51uu2rygmA5wO10';
const Cloud={
 sb:null, ready:false, _lastPush:'', _pushTimer:null, _pendingRemote:null, _emptyRemote:false,
 async init(){
  try{
   const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
   this.sb = createClient(CLOUD_URL, CLOUD_ANON, { realtime:{ params:{ eventsPerSecond:5 } } });
   const ok = await this.pull();            // cloud wins on open
   if(!ok){ this.ready=false; return; }     // table not ready — stay fully local, no false "synced"
   this.ready=true;
   if(this._emptyRemote){ this._lastPush=''; this.push(state); }  // seed the shared dataset on first ever open
   setSaveState(storageOK?'Saved · synced to all staff':'In-memory only — export a backup');
   this.subscribe();
  }catch(e){ this.ready=false; /* offline / blocked — run on localStorage */ }
 },
 async pull(){
  try{
   const { data, error } = await this.sb.from('capital_kv').select('value').eq('key',SKEY).maybeSingle();
   if(error) return false;                  // e.g. table missing → not synced
   if(!data || data.value==null){ this._emptyRemote=true; return true; }
   this._lastPush = JSON.stringify(data.value);
   applyRemoteState(data.value);
   return true;
  }catch(e){ return false; }
 },
 push(st){
  if(!this.ready||!this.sb) return;
  const json=JSON.stringify(st);
  if(json===this._lastPush) return;
  this._lastPush=json;
  clearTimeout(this._pushTimer);
  this._pushTimer=setTimeout(()=>{
   this.sb.from('capital_kv').upsert({key:SKEY,value:st,updated_at:new Date().toISOString()},{onConflict:'key'})
     .then(({error})=>{ if(error) console.warn('[atrium-accounts] push',error.message); });
  },250);
 },
 subscribe(){
  this.sb.channel('atrium-accounts-sync')
   .on('postgres_changes',{event:'*',schema:'public',table:'capital_kv',filter:'key=eq.'+SKEY},payload=>{
     const val=payload.new && payload.new.value; if(val==null) return;
     const json=JSON.stringify(val);
     if(json===this._lastPush) return;       // our own echo
     this._lastPush=json;
     applyRemoteState(val);
   })
   .subscribe();
 }
};
/* Merge a remote snapshot into the running app without nuking an open form. */
function applyRemoteState(val){
 if(document.getElementById('clientOverlay')?.classList.contains('open')){ Cloud._pendingRemote=val; return; }
 state = val;
 ['clients','clientInvoices','expenses','loans','settlements','groupInvoices'].forEach(k=>{ if(!Array.isArray(state[k])) state[k]=defaultState()[k]||[]; });
 if(!state.settings) state.settings=defaultState().settings;
 if(!state.entity || !ENTITIES.includes(state.entity)) state.entity='Consolidated';
 if(!state.nextId) state.nextId=1000;
 try{ localStorage.setItem(SKEY, JSON.stringify(state)); }catch(e){}
 buildEntitySelect(); render();
}

/* ---------- boot ---------- */
function boot(){
 const saved = Store.get();
 state = saved || defaultState();
 // migrations / guards
 ['clients','clientInvoices','expenses','loans','settlements','groupInvoices'].forEach(k=>{ if(!Array.isArray(state[k])) state[k]=defaultState()[k]||[]; });
 if(!state.settings) state.settings=defaultState().settings;
 if(!state.entity) state.entity='Consolidated';
 if(!state.nextId) state.nextId=1000;
 if(!ENTITIES.includes(state.entity)) state.entity='Consolidated';
 ui.billMonth = currentYM();
 buildEntitySelect();
 buildRail();
 render();
 setSaveState(storageOK?'Saved automatically':'In-memory only — export a backup');
 Cloud.init();   // non-blocking: pull + subscribe once the SDK loads
}
document.addEventListener('DOMContentLoaded', boot);
