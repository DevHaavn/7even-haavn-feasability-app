<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATRIUM — Projects · Working Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
 /* ATRIUM silver-glass (Step 0). The token NAMES are unchanged on purpose —
    ~1800 lines of rules reference them, so remapping the values restyles the
    whole system without touching a single selector, value, field or handler.
    Golden rule: pixels change, behaviour identical. */
 /* chrome + surfaces: forest-black -> blue-black */
 --void:#0a0e14;--carbon:#0c1219;--graphite:#12181f;--steel:#1e262f;--steel-2:#2c3540;--steel-3:#46525e;
 /* --f-* was the brand green AND the functional green. It is now functional
    ONLY (live / positive / progress, plus the + create buttons) — every brand
    use in the chrome below moves to silver. Values retuned to the new green. */
 --f-900:#0c2b1d;--f-800:#123c29;--f-700:#175033;--f-600:#1d6a45;--f-500:#2f9e6b;--f-400:#43b07c;--f-300:#57c08a;--f-100:#d8efe3;--f-50:#f0f9f4;
 /* silver / platinum — the accent */
 --sil-1:#eef2f5;--sil-2:#cdd8e2;--sil-3:#9aa8b6;--sil-4:#6c7a88;
 --silver:#9aa8b6;--silver-hi:#cdd8e2;--silver-soft:rgba(154,168,182,.14);--silver-line:rgba(154,168,182,.4);
 --amber:#d59a52;--red:#e0645c;--red-txt:#e0645c;--blue:#6f92c9;--xero:#28b6ea;
 /* light content — blue-grey, not the old green-grey */
 --ink:#232c37;--ink-2:#5b6672;--mute:#5b6672;--faint:#8592a0;--line:#dfe3e8;--line-2:#eaedf1;--grey-50:#f4f6f9;--grey-100:#dfe5ec;--grey-200:#d5dde6;
 --disp:'Inter Tight',system-ui,sans-serif;--body:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--serif:'Cormorant Garamond',Georgia,serif;
 --ease:cubic-bezier(.32,.72,0,1);--r:12px;--r-m:16px;--r-l:22px;
 --brushed:linear-gradient(100deg,#DCE1E2,#F4F6F7 16%,#BDC5C7 40%,#EEF1F2 56%,#A6AEB0 80%,#DCE1E2);
 --sil-grad:linear-gradient(180deg,#F2F4F5,#C6CDCF 46%,#9AA2A4);
 --sh-l:0 14px 40px -10px rgba(0,0,0,.55),0 50px 100px -30px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--void);color:var(--sil-1);font-family:var(--body);line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
/* Selection and focus are brand furniture, not status — silver, not green. */
::selection{background:var(--silver);color:#0b1015}
:focus-visible{outline:2px solid var(--silver-hi);outline-offset:2px;border-radius:6px}
button{font-family:inherit}
.carbon{background-color:#0b0f0e;
 background-image:linear-gradient(27deg,#1b2226 6px,transparent 6px) 0 6px,linear-gradient(207deg,#1b2226 6px,transparent 6px) 12px 0,
 linear-gradient(27deg,#0d1211 6px,transparent 6px) 0 12px,linear-gradient(207deg,#0d1211 6px,transparent 6px) 12px 6px,
 linear-gradient(90deg,#12181a 12px,transparent 12px),linear-gradient(#171e20 25%,#0e1413 25%,#0e1413 50%,transparent 50%,transparent 75%,#171e20 75%,#171e20);
 background-size:24px 24px}
.sheen{position:relative}
.sheen::after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(118deg,rgba(224,232,234,.09),transparent 36%,transparent 64%,rgba(224,232,234,.05));mix-blend-mode:screen}
.sil-txt{background:var(--sil-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.livery{display:inline-flex;align-items:center;height:5px;width:130px;border-radius:3px;overflow:hidden}
.livery .g{width:34px;height:100%;background:linear-gradient(180deg,var(--silver-hi),var(--sil-4))}
.livery .s{flex:1;height:100%;background:var(--brushed)}
.mono{font-family:var(--mono)}

/* ====== APP SHELL ====== */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
/* Chrome (topbar + rail) is ALWAYS dark, in both themes — it sits outside
   .main, which is the element the light/dark class lands on, so it can never be
   flipped. That is what keeps light mode readable. */
.topbar{flex:0 0 auto;display:flex;align-items:center;gap:16px;padding:0 20px;height:58px;background:linear-gradient(180deg,#0f151c,#0b1015);backdrop-filter:blur(20px) saturate(150%);border-bottom:1px solid var(--steel);z-index:40}
.atr{display:inline-flex;align-items:center;gap:11px}
.atr .w{font-family:var(--disp);font-weight:600;letter-spacing:.30em;text-transform:uppercase;padding-left:.30em;font-size:14px}
.dev{display:inline-block;flex:0 0 auto}.dev svg{width:100%;display:block}
.topnav{margin-left:20px;display:flex;gap:4px}
.topnav button{background:none;border:none;color:var(--sil-4);font-family:var(--mono);font-size:10.5px;letter-spacing:.11em;text-transform:uppercase;padding:8px 13px;border-radius:8px;cursor:pointer;transition:.15s}
.topnav button:hover{color:var(--sil-1)}
.topnav button.on{color:var(--silver-hi);background:var(--silver-soft)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.partner{display:inline-flex;align-items:center;gap:11px;font-family:var(--disp);font-weight:600;letter-spacing:.22em;text-transform:uppercase;font-size:10.5px;color:var(--sil-3)}
.partner .sep{width:1px;height:12px;background:var(--steel-2)}
.userchip{display:flex;align-items:center;gap:9px;padding:5px 6px 5px 12px;border:1px solid var(--steel-2);border-radius:100px;background:rgba(255,255,255,.03)}
.userchip .nm{font-size:12px;color:var(--sil-2)}
.userchip .av{width:26px;height:26px;border-radius:50%;background:linear-gradient(180deg,var(--f-500),var(--f-800));display:grid;place-items:center;font-family:var(--disp);font-weight:600;font-size:11px;color:#fff}

.body{flex:1;display:flex;min-height:0}
/* rail */
/* 214px labelled rail kept as-is. The preview mock draws a 64px icon-only rail,
   but playbook rule 2 says the mock is look-and-feel, not a structure spec —
   this rail carries labels and counts the icon rail has nowhere to put. */
.rail{flex:0 0 214px;background:linear-gradient(180deg,#0f151c,#0b1015);border-right:1px solid var(--steel);display:flex;flex-direction:column;padding:14px 12px;gap:3px;overflow-y:auto}
.rail .grp{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--sil-4);padding:14px 10px 6px}
.navitem{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;color:var(--sil-3);font-size:13.5px;cursor:pointer;border:1px solid transparent;transition:.14s;text-align:left;width:100%;background:none;font-weight:450}
.navitem:hover{background:rgba(255,255,255,.04);color:var(--sil-1)}
.navitem.on{background:linear-gradient(180deg,rgba(154,168,182,.20),rgba(154,168,182,.08));border-color:var(--silver-line);color:#fff}
.navitem .ic{width:17px;height:17px;flex:0 0 auto;opacity:.85}
.navitem.on .ic{opacity:1}
.navitem .ct{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--sil-4);background:rgba(255,255,255,.05);padding:1px 7px;border-radius:20px}
.navitem.on .ct{color:var(--silver-hi)}
.rail .newbtn{margin:8px 2px 2px;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;border-radius:11px;background:linear-gradient(180deg,var(--f-500),var(--f-700));color:#fff;font-weight:600;font-size:13px;border:1px solid rgba(0,0,0,.2);cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 8px 22px -8px rgba(27,94,63,.6);transition:transform .12s var(--ease)}
.rail .newbtn:active{transform:scale(.97)}
.railfoot{margin-top:auto;padding:12px 10px 4px;border-top:1px solid var(--steel);font-family:var(--mono);font-size:9.5px;color:var(--sil-4);line-height:1.7}

/* main scroll */
.main{flex:1;min-width:0;overflow-y:auto;position:relative}
.main.dark{background:var(--void)}
.main.dark::before{content:"";position:fixed;inset:58px 0 0 214px;z-index:0;pointer-events:none;
  background:radial-gradient(120% 80% at 82% -10%,rgba(120,150,180,.14),transparent 55%),
             radial-gradient(90% 70% at 12% 110%,rgba(30,45,60,.5),transparent 60%)}
.main.light{background:linear-gradient(158deg,#e7ecf2,#dde4ec 45%,#d2dbe5)}
.main.light::before{content:"";position:fixed;inset:58px 0 0 214px;z-index:0;pointer-events:none;
  background:radial-gradient(120% 85% at 12% -12%,rgba(188,206,226,.6),transparent 55%),
             radial-gradient(110% 80% at 92% 8%,rgba(206,214,226,.5),transparent 55%)}
.page{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:30px 34px 80px}

/* page header */
.phead{display:flex;align-items:flex-end;gap:18px;margin-bottom:26px}
.phead .n{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;color:var(--f-300)}
.phead h1{font-family:var(--serif);font-weight:500;font-size:clamp(26px,3.4vw,38px);letter-spacing:.01em;color:#fff;line-height:1.05;margin-top:5px}
.light .phead h1{color:var(--ink)}
.phead .sub{font-size:13.5px;color:var(--sil-3);margin-top:7px;max-width:64ch;line-height:1.6}
.light .phead .sub{color:var(--mute)}
.phead .liv{margin-top:12px}
.phead .actions{margin-left:auto;display:flex;gap:10px;align-items:center}

/* buttons */
.btn{position:relative;overflow:hidden;height:38px;padding:0 16px;border-radius:11px;border:1px solid var(--steel-2);background:rgba(255,255,255,.05);color:var(--sil-1);font-size:12.5px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:transform .12s var(--ease),background .2s;white-space:nowrap}
.btn:active{transform:scale(.97)}.btn:hover{background:rgba(255,255,255,.1)}
.btn-green{background:linear-gradient(180deg,var(--f-500),var(--f-700));color:#fff;border-color:rgba(0,0,0,.2);font-weight:600;box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 8px 22px -8px rgba(27,94,63,.6)}
.btn-sil{background:var(--brushed);color:#14181a;border:none;font-weight:600;box-shadow:inset 0 1px 0 rgba(255,255,255,.6)}
.light .btn{border-color:var(--line);background:#fff;color:var(--ink-2)}
.light .btn:hover{background:var(--grey-50)}
.btn.sm{height:31px;padding:0 12px;font-size:11.5px;border-radius:9px}

/* pills */
.pill{display:inline-flex;align-items:center;gap:7px;height:25px;padding:0 11px;border-radius:100px;font-family:var(--mono);font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;border:1px solid;white-space:nowrap}
.pill i{width:6px;height:6px;border-radius:50%}
.pill.live{border-color:rgba(111,190,150,.4);color:var(--f-300);background:rgba(35,122,82,.12)}
.pill.live i{background:var(--f-300);box-shadow:0 0 7px var(--f-400)}
.pill.hold{border-color:rgba(201,162,75,.4);color:var(--amber);background:rgba(201,162,75,.1)}
.pill.hold i{background:var(--amber)}
.tagcls{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;background:var(--sil-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.light .tagcls{background:linear-gradient(180deg,#5b6265,#3a3f42);-webkit-background-clip:text;background-clip:text}

/* KPI cards */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
.wcard{background:#fff;border-radius:var(--r-m);padding:16px 18px 17px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.04)}
.wcard .bz{position:absolute;top:0;left:0;right:0;height:3px;background:var(--brushed)}
.wcard .k{font-size:11px;color:var(--mute);margin-top:5px;font-weight:500}
/* KPI value is INK by default, and mono. It was green on every card, which
   spent the signal colour on figures carrying no status — the preview colours a
   value only when it means something (positive / caution / risk / silver). */
.wcard .v{font-family:var(--mono);font-weight:600;font-size:29px;color:var(--sil-1);letter-spacing:-.03em;margin-top:6px;line-height:1}
.main.light .wcard .v{color:var(--ink)}
.wcard .d{font-family:var(--mono);font-size:9.5px;color:var(--faint);margin-top:8px;letter-spacing:.03em}
/* Feature card: solid green slab -> the silver-glass wash. Class name kept so
   no markup changes; only its appearance does. */
.wcard.green{background:linear-gradient(150deg,var(--silver-soft),var(--card));border-color:var(--silver-line)}
.wcard.green .k{color:var(--sil-3)}.wcard.green .v{color:var(--silver-hi)}.wcard.green .d{color:var(--sil-4)}
.main.light .wcard.green{background:linear-gradient(150deg,rgba(110,124,142,.13),rgba(255,255,255,.72));border-color:rgba(110,124,142,.4)}
.main.light .wcard.green .k{color:var(--mute)}.main.light .wcard.green .v{color:#4a5a6e}.main.light .wcard.green .d{color:var(--faint)}

/* project cards (dark) */
.projgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.pcard{border:1px solid var(--steel-2);border-radius:18px;overflow:hidden;background:linear-gradient(180deg,#111615,#0a0d0c);cursor:pointer;transition:transform .16s var(--ease),border-color .2s}
.pcard:hover{transform:translateY(-2px);border-color:rgba(111,190,150,.4)}
.pcard .bz{height:4px;background:var(--brushed)}
.pcard .pc{padding:20px 22px}
.pcard .toprow{display:flex;align-items:flex-start;gap:12px}
.pcard .pid{font-family:var(--mono);font-size:10px;color:var(--f-300);letter-spacing:.08em}
.pcard h3{font-family:var(--disp);font-weight:600;font-size:18px;color:#fff;letter-spacing:-.01em;margin-top:5px;line-height:1.15}
.pcard .addr{font-size:12.5px;color:var(--sil-3);margin-top:5px}
.pcard .meta{display:flex;gap:22px;margin-top:18px;padding-top:16px;border-top:1px solid rgba(198,205,207,.09)}
.pcard .meta .lb{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--sil-4)}
.pcard .meta .vl{font-family:var(--disp);font-weight:600;font-size:16px;color:var(--sil-1);margin-top:4px;letter-spacing:-.02em}
.pcard .prog{margin-top:16px}
.pcard .ptrack{height:6px;border-radius:6px;background:rgba(255,255,255,.07);overflow:hidden}
.pcard .pfill{height:100%;background:linear-gradient(90deg,var(--f-600),var(--f-300));border-radius:6px;transition:width .5s var(--ease)}
.pcard .pmeta{display:flex;justify-content:space-between;margin-top:7px;font-family:var(--mono);font-size:9.5px;color:var(--sil-4)}

/* section head inside pages */
.sec{margin:34px 0 16px;display:flex;align-items:center;gap:14px}
.sec h2{font-family:var(--serif);font-weight:500;font-size:23px;color:#fff}
.light .sec h2{color:var(--ink)}
.sec .liv{opacity:.9}
.sec .rt{margin-left:auto}

/* ===== LIGHT WORK SURFACE PANELS ===== */
.panel{background:#fff;border:1px solid var(--line);border-radius:var(--r-l);overflow:hidden;box-shadow:0 1px 2px rgba(20,24,26,.03)}
.panel .ph{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line-2);background:var(--grey-50)}
.panel .ph h3{font-family:var(--disp);font-weight:600;font-size:14px;color:var(--ink);letter-spacing:-.01em}
.panel .ph .rt{margin-left:auto;display:flex;gap:8px;align-items:center}
.panel .ph .cnt{font-family:var(--mono);font-size:10px;color:var(--mute)}

/* info grid */
.infogrid{display:grid;grid-template-columns:repeat(2,1fr);gap:0}
.infocell{padding:15px 20px;border-bottom:1px solid var(--line-2);border-right:1px solid var(--line-2)}
.infocell .lb{font-family:var(--mono);font-size:9.5px;letter-spacing:.11em;text-transform:uppercase;color:var(--faint)}
.infocell .vl{font-size:14px;color:var(--ink);margin-top:6px;font-weight:500}
.infocell .vl.mono{font-family:var(--mono);font-size:13px}
.infocell.full{grid-column:1/-1;border-right:none}

/* checklist */
.clgroup{border-bottom:1px solid var(--line-2)}
.clghead{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--grey-50);cursor:pointer}
.clghead .gl{font-family:var(--disp);font-weight:600;font-size:12.5px;color:var(--ink-2);letter-spacing:.01em}
.clghead .gc{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--mute)}
.clghead .gbar{width:70px;height:5px;border-radius:5px;background:var(--grey-200);overflow:hidden}
.clghead .gbf{height:100%;background:linear-gradient(90deg,var(--f-500),var(--f-400));border-radius:5px;transition:width .4s var(--ease)}
.cli{display:flex;align-items:center;gap:14px;padding:12px 20px 12px 24px;border-top:1px solid var(--line-2);transition:background .15s}
.cli:hover{background:var(--grey-50)}
.cli .cb{width:20px;height:20px;border:1.6px solid var(--steel-3);border-radius:6px;flex:0 0 auto;cursor:pointer;display:grid;place-items:center;transition:.15s;background:#fff}
.cli .cb:hover{border-color:var(--f-500)}
.cli.done .cb{background:var(--f-500);border-color:var(--f-500)}
.cli .cb svg{width:12px;height:12px;opacity:0;transition:.15s}
.cli.done .cb svg{opacity:1}
.cli .num{font-family:var(--mono);font-size:11px;color:var(--faint);width:20px;flex:0 0 auto}
.cli .tk{font-size:13.5px;color:var(--ink);flex:1;transition:.15s}
.cli.done .tk{color:var(--faint);text-decoration:line-through;text-decoration-color:var(--line)}
.cli .own{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;color:var(--mute);border:1px solid var(--line);border-radius:6px;padding:2px 7px;flex:0 0 auto}
.cli .st{flex:0 0 auto;width:74px;text-align:right}
.tinypill{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:20px}
.tinypill.open{color:var(--mute);background:var(--grey-100)}
.tinypill.done{color:var(--f-600);background:var(--f-50)}

/* progress ring */
.ringwrap{display:flex;align-items:center;gap:22px;padding:22px 24px}
.ring{position:relative;width:96px;height:96px;flex:0 0 auto}
.ring svg{transform:rotate(-90deg)}
.ring .rt{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.ring .rv{font-family:var(--disp);font-weight:600;font-size:23px;color:var(--f-600);letter-spacing:-.03em;line-height:1}
.ring .rl{font-family:var(--mono);font-size:8px;color:var(--mute);letter-spacing:.1em;margin-top:2px}
.ringinfo .rh{font-family:var(--disp);font-weight:600;font-size:15px;color:var(--ink)}
.ringinfo p{font-size:12.5px;color:var(--mute);margin-top:5px;line-height:1.55;max-width:44ch}

/* tables (templates) */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-family:var(--mono);font-size:9px;letter-spacing:.11em;text-transform:uppercase;color:var(--faint);text-align:left;padding:11px 16px;border-bottom:1px solid var(--line);background:var(--grey-50);font-weight:400}
.tbl td{padding:12px 16px;border-bottom:1px solid var(--line-2);font-size:13px;color:var(--ink-2);vertical-align:middle}
.tbl tr:hover td{background:var(--grey-50)}
.tbl .tname{font-weight:500;color:var(--ink)}
.tbl .fmt{font-family:var(--mono);font-size:10px;color:var(--mute);border:1px solid var(--line);border-radius:5px;padding:2px 7px}
.tbl .dest{font-family:var(--mono);font-size:10.5px;color:var(--f-600)}
.tbl .fn{font-family:var(--mono);font-size:10.5px;color:var(--mute)}
.st-tag{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px;white-space:nowrap}
.st-drafted{color:var(--f-600);background:var(--f-50)}
.st-req{color:var(--amber);background:rgba(201,162,75,.12)}
.st-ready{color:#fff;background:var(--f-500)}

/* file tree */
.tree{padding:8px 6px}
.folder{border-radius:10px}
.frow{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;transition:background .12s}
.frow:hover{background:var(--grey-50)}
.frow .fi{width:18px;height:18px;flex:0 0 auto;color:var(--amber)}
.frow .fname{font-size:13px;color:var(--ink-2);font-weight:500}
.frow .fnum{font-family:var(--mono);font-size:11px;color:var(--f-600);width:26px;flex:0 0 auto}
.frow .fmeta{margin-left:auto;font-family:var(--mono);font-size:9.5px;color:var(--faint)}
.frow .chev{width:14px;height:14px;color:var(--faint);transition:transform .2s}
.folder.open .frow>.chev{transform:rotate(90deg)}
.fchildren{display:none;padding:2px 0 6px 34px}
.folder.open>.fchildren{display:block}
.doc{display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:8px}
.doc:hover{background:var(--grey-50)}
.doc .di{width:14px;height:14px;color:var(--f-500);flex:0 0 auto}
.doc .dn{font-family:var(--mono);font-size:11px;color:var(--ink-2)}
.doc .dt{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--faint)}
.subfolder .frow .fi{color:#c69a3f;opacity:.75}

/* project workspace header */
.pws{background:linear-gradient(180deg,#0c1210,#080b0a);border-bottom:1px solid var(--steel);padding:22px 34px 0}
.pws .bc{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--sil-4);cursor:pointer}
.pws .bc:hover{color:var(--f-300)}
.pws .wtop{display:flex;align-items:flex-end;gap:16px;margin-top:12px}
.pws h1{font-family:var(--serif);font-weight:500;font-size:30px;color:#fff;line-height:1}
.pws .waddr{font-family:var(--mono);font-size:11.5px;color:var(--sil-3);margin-top:8px}
.pws .wpid{font-family:var(--mono);font-size:11px;color:var(--f-300);letter-spacing:.1em}
.pws .wact{margin-left:auto;display:flex;gap:10px;align-items:center}
.wtabs{display:flex;gap:2px;margin-top:20px}
.wtab{background:none;border:none;color:var(--sil-4);font-family:var(--disp);font-weight:500;font-size:13px;padding:11px 16px;cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.wtab:hover{color:var(--sil-1)}
.wtab.on{color:#fff;border-bottom-color:var(--f-400)}

/* wizard */
.wiz{max-width:820px;margin:0 auto}
.wizcard{background:#fff;border:1px solid var(--line);border-radius:var(--r-l);overflow:hidden}
.wizsec{padding:20px 26px;border-bottom:1px solid var(--line-2)}
.wizsec .wl{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--f-600);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.wizsec .wl::after{content:"";flex:1;height:1px;background:var(--line-2)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
.field label{font-size:11.5px;color:var(--mute);font-weight:500}
.field input,.field select,.field textarea{font-family:var(--body);font-size:13.5px;color:var(--ink);padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;transition:.15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--f-400);box-shadow:0 0 0 3px rgba(56,153,107,.13)}
.field input::placeholder,.field textarea::placeholder{color:#b7bdbd}
.field .hint{font-family:var(--mono);font-size:9.5px;color:var(--faint)}
.wizfoot{display:flex;align-items:center;gap:12px;padding:18px 26px;background:var(--grey-50)}
.wizfoot .note{font-size:12px;color:var(--mute)}
.wizfoot .rt{margin-left:auto;display:flex;gap:10px}

/* provisioning overlay */
.prov{position:fixed;inset:0;z-index:80;background:rgba(5,7,6,.86);backdrop-filter:blur(10px);display:none;place-items:center}
.prov.on{display:grid}
.provbox{width:min(520px,90vw);border:1px solid var(--steel-2);border-radius:var(--r-l);background:linear-gradient(180deg,#0f1614,#0a0d0c);padding:34px 36px;text-align:left}
.provbox .pv-h{font-family:var(--serif);font-weight:500;font-size:24px;color:#fff;text-align:center}
.provbox .pv-s{text-align:center;font-family:var(--mono);font-size:10.5px;color:var(--sil-4);letter-spacing:.06em;margin-top:8px}
.provlist{margin-top:24px;display:flex;flex-direction:column;gap:2px}
.provrow{display:flex;align-items:center;gap:12px;padding:9px 4px;font-size:13px;color:var(--sil-3);opacity:.4;transition:.3s}
.provrow.on{opacity:1;color:var(--sil-1)}
.provrow .pm{width:18px;height:18px;flex:0 0 auto;display:grid;place-items:center}
.provrow .spin{width:14px;height:14px;border:2px solid var(--steel-2);border-top-color:var(--f-400);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.provrow .chk{color:var(--f-300)}

/* toast */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);z-index:90;background:linear-gradient(180deg,#12191a,#0b0f0e);border:1px solid var(--steel-2);border-radius:12px;padding:13px 20px;display:flex;align-items:center;gap:12px;font-size:13px;color:var(--sil-1);opacity:0;pointer-events:none;transition:.3s var(--ease);box-shadow:var(--sh-l)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast .ti{width:8px;height:8px;border-radius:50%;background:var(--f-400);box-shadow:0 0 8px var(--f-400)}

/* empty */
.empty{text-align:center;padding:60px 20px;color:var(--sil-4)}
.empty .eh{font-family:var(--serif);font-size:20px;color:var(--sil-2);margin-bottom:8px}
.empty p{font-size:13px;max-width:40ch;margin:0 auto}

/* meetings/feasibility stub */
.stub{border:1px dashed var(--steel-2);border-radius:var(--r-l);padding:48px;text-align:center;background:linear-gradient(180deg,#0e1211,#0a0d0c)}
.stub .sh2{font-family:var(--serif);font-size:22px;color:#fff}
.stub p{color:var(--sil-3);font-size:13.5px;margin-top:10px;max-width:52ch;margin-inline:auto;line-height:1.6}
.stub .liv{margin:18px auto 0;justify-content:center}

/* overview pillars + snapshot */
.pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.pill4{background:#fff;border:1px solid var(--line);border-radius:var(--r-m);padding:15px 18px;cursor:pointer;transition:transform .14s var(--ease),box-shadow .2s;position:relative;overflow:hidden}
.pill4[data-ptab]:hover{transform:translateY(-2px);box-shadow:0 12px 28px -16px rgba(20,24,26,.45)}
.pill4 .bz{position:absolute;top:0;left:0;right:0;height:3px;background:var(--brushed)}
.pill4 .k{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-top:5px}
.pill4 .v{font-family:var(--disp);font-weight:600;font-size:27px;color:var(--f-600);letter-spacing:-.03em;margin-top:7px;line-height:1}
.pill4 .d{font-size:11px;color:var(--mute);margin-top:7px}
.pill4 .d .neg{color:var(--red);font-family:var(--mono);font-weight:500}
.pill4 .d .pos{color:var(--f-600);font-family:var(--mono);font-weight:500}
.pill4 .bar{height:5px;border-radius:5px;background:var(--grey-200);overflow:hidden;margin-top:12px}
.pill4 .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--f-500),var(--f-300));border-radius:5px;transition:width .5s var(--ease)}
.snap{display:flex;flex-direction:column}
.snaprow{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--line-2)}
.snaprow:last-child{border-bottom:none}
.snaprow .sk{font-size:12.5px;color:var(--mute)}
.snaprow .sv{margin-left:auto;font-family:var(--disp);font-weight:600;font-size:15px;color:var(--ink);letter-spacing:-.02em}
.snaprow .sv.mono{font-family:var(--mono);font-size:13px;font-weight:500}
.snaprow .sv.neg{color:var(--red)}.snaprow .sv.pos{color:var(--f-600)}
.clientnote{padding:16px 20px;font-size:12.5px;color:var(--mute);line-height:1.65}
.clientnote b{color:var(--ink)}

/* programme timeline */
.tl{padding:6px 0 2px}
.tlrow{display:flex;gap:16px;padding:0 22px}
.tlrow .tmark{display:flex;flex-direction:column;align-items:center;flex:0 0 auto;width:16px}
.tlrow .dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--grey-200);background:#fff;margin-top:16px;z-index:2;flex:0 0 auto}
.tlrow .line{width:2px;flex:1;background:var(--grey-200);margin-top:2px;min-height:8px}
.tlrow:last-child .line{display:none}
.tlrow.done .dot{background:var(--f-500);border-color:var(--f-500)}
.tlrow.done .line{background:var(--f-400)}
.tlrow.active .dot{background:#fff;border-color:var(--f-500);box-shadow:0 0 0 4px rgba(35,122,82,.15)}
.tlrow.late .dot{background:var(--red);border-color:var(--red)}
.tlbody{flex:1;padding:12px 0 18px;border-bottom:1px solid var(--line-2);cursor:pointer}
.tlrow:last-child .tlbody{border-bottom:none}
.tlbody .tn{font-size:14px;color:var(--ink);font-weight:500}
.tlrow.done .tn{color:var(--mute)}
.tlbody .tmeta{display:flex;gap:12px;margin-top:6px;align-items:center}
.tlbody .td{font-family:var(--mono);font-size:10.5px;color:var(--faint)}
.tstate{font-family:var(--mono);font-size:8.5px;letter-spacing:.07em;text-transform:uppercase;padding:2px 8px;border-radius:20px}
.tstate.done{color:var(--f-600);background:var(--f-50)}
.tstate.active{color:var(--f-600);background:var(--f-50);border:1px solid rgba(56,153,107,.3)}
.tstate.upcoming{color:var(--mute);background:var(--grey-100)}
.tstate.late{color:#fff;background:var(--red)}

/* financials */
.finkpis,.qkpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.spendchart{display:flex;align-items:flex-end;gap:8px;height:132px;padding:18px 22px 12px}
.spendbar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:8px;height:100%}
.spendbar>i{width:100%;max-width:32px;background:linear-gradient(180deg,var(--f-400),var(--f-700));border-radius:5px 5px 0 0;transition:height .5s var(--ease);min-height:3px}
.spendbar .bl{font-family:var(--mono);font-size:9px;color:var(--faint)}
.budgetbar{margin:16px 22px 8px;height:34px;border-radius:9px;background:var(--grey-100);position:relative;overflow:hidden;border:1px solid var(--line)}
.budgetbar .certf{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--f-600),var(--f-400));display:flex;align-items:center;padding-left:12px;font-family:var(--mono);font-size:10px;color:#fff;transition:width .5s var(--ease)}
.budgetbar .fmark{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink)}
.qring{display:flex;align-items:center;gap:20px;padding:20px 24px}

/* senior management */
.mperiod{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--sil-3);border:1px solid var(--steel-2);border-radius:100px;padding:7px 14px}
.pmgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.pmcard{border:1px solid var(--steel-2);border-radius:18px;overflow:hidden;background:linear-gradient(180deg,#111615,#0a0d0c)}
.pmcard .bz{height:4px;background:var(--brushed)}
.pmcard .pmc{padding:20px 22px}
.pmhead{display:flex;align-items:center;gap:13px}
.pmav{width:46px;height:46px;border-radius:12px;background:linear-gradient(180deg,var(--f-500),var(--f-800));display:grid;place-items:center;font-family:var(--disp);font-weight:600;font-size:15px;color:#fff;flex:0 0 auto;border:1px solid rgba(255,255,255,.12)}
.pmhead .nm{font-family:var(--disp);font-weight:600;font-size:16px;color:#fff;letter-spacing:-.01em}
.pmhead .ro{font-family:var(--mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--sil-4);margin-top:4px}
.pmidx{margin-left:auto;text-align:right;flex:0 0 auto}
.pmidx .iv{font-family:var(--disp);font-weight:600;font-size:27px;letter-spacing:-.03em;color:var(--f-300);line-height:1}
.pmidx .il{font-family:var(--mono);font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--sil-4);margin-top:3px}
.pmidx .tr{font-family:var(--mono);font-size:10px;margin-top:4px}
.pmidx .tr.up{color:var(--f-300)}.pmidx .tr.down{color:var(--red-txt)}
.pmstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px 12px;margin-top:18px;padding-top:16px;border-top:1px solid rgba(198,205,207,.09)}
.pmstat .sl{font-family:var(--mono);font-size:8.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--sil-4)}
.pmstat .sv{font-family:var(--disp);font-weight:600;font-size:16px;color:var(--sil-1);margin-top:5px;letter-spacing:-.02em}
.pmstat .sv.neg{color:var(--red-txt)}.pmstat .sv.pos{color:var(--f-300)}
.pmprojs{margin-top:16px;padding-top:14px;border-top:1px solid rgba(198,205,207,.09);display:flex;flex-direction:column;gap:5px}
.pmproj{display:flex;align-items:center;gap:10px;cursor:pointer;padding:6px;border-radius:8px;transition:background .12s}
.pmproj:hover{background:rgba(255,255,255,.04)}
.pmproj .pn{font-size:12px;color:var(--sil-2);width:118px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:0 0 auto}
.pmproj .pb{flex:1;height:5px;border-radius:5px;background:rgba(255,255,255,.08);overflow:hidden}
.pmproj .pb>i{display:block;height:100%;background:linear-gradient(90deg,var(--f-600),var(--f-300))}
.pmproj .ps{font-family:var(--mono);font-size:10px;width:42px;text-align:right;flex:0 0 auto}
.cmp{display:flex;flex-direction:column;gap:13px;padding:20px 22px}
.cmprow{display:flex;align-items:center;gap:14px}
.cmprow .cn{width:120px;font-size:13px;color:var(--sil-2);flex:0 0 auto;display:flex;align-items:center;gap:9px}
.cmprow .cn .mav{width:22px;height:22px;border-radius:6px;background:linear-gradient(180deg,var(--f-500),var(--f-800));display:grid;place-items:center;font-family:var(--disp);font-weight:600;font-size:8px;color:#fff;flex:0 0 auto}
.cmprow .ct{flex:1;height:24px;border-radius:7px;background:rgba(255,255,255,.05);overflow:hidden}
.cmprow .cf{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--f-700),var(--f-400));transition:width .6s var(--ease)}
.cmprow .cvv{width:34px;text-align:right;font-family:var(--disp);font-weight:600;font-size:15px;color:var(--f-300);flex:0 0 auto}
.mfilter{display:flex;gap:8px}
.mchip{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:6px 12px;border-radius:100px;border:1px solid var(--steel-2);color:var(--sil-4);background:none;cursor:pointer;transition:.14s}
.mchip:hover{color:var(--sil-1)}
.mchip.on{color:var(--f-300);border-color:rgba(111,190,150,.4);background:rgba(35,122,82,.12)}
.mlistwrap{overflow-x:auto;border:1px solid var(--steel);border-radius:16px;background:linear-gradient(180deg,#0e1211,#0a0d0c)}
.mlist{min-width:820px}
.mlh,.mrow{display:grid;grid-template-columns:2fr 1.2fr .8fr 1.1fr 1.2fr 1.1fr .9fr;gap:12px;align-items:center;padding:13px 20px}
.mlh{border-bottom:1px solid var(--steel);font-family:var(--mono);font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--sil-4)}
.mrow{border-top:1px solid rgba(198,205,207,.07);cursor:pointer;transition:background .12s}
.mrow:hover{background:rgba(255,255,255,.03)}
.mrow .mp{font-family:var(--disp);font-weight:600;font-size:13.5px;color:#fff}
.mrow .mpid{font-family:var(--mono);font-size:9px;color:var(--f-300);margin-top:2px}
.mpm{display:flex;align-items:center;gap:8px}
.mpm .mav{width:24px;height:24px;border-radius:7px;background:linear-gradient(180deg,var(--f-500),var(--f-800));display:grid;place-items:center;font-family:var(--disp);font-weight:600;font-size:8.5px;color:#fff;flex:0 0 auto}
.mpm .mnm{font-size:12px;color:var(--sil-2)}
.mval{font-family:var(--mono);font-size:12px;color:var(--sil-1)}
.mmini{display:flex;align-items:center;gap:8px}
.mmini .mt{flex:1;height:5px;border-radius:5px;background:rgba(255,255,255,.08);overflow:hidden}
.mmini .mf{display:block;height:100%;background:linear-gradient(90deg,var(--f-600),var(--f-300))}
.mmini .mpct{font-family:var(--mono);font-size:10px;color:var(--sil-4);width:30px;text-align:right}
.msched{font-family:var(--mono);font-size:12px;text-align:right}
.msched.neg{color:var(--red-txt)}.msched.pos{color:var(--f-300)}.msched.zero{color:var(--sil-4)}
.st-open{color:var(--mute);background:var(--grey-100)}
.railbrand{display:flex;align-items:center;gap:11px;padding:4px 10px 14px;margin-bottom:2px;border-bottom:1px solid var(--steel)}
.railbrand .railwm{font-family:var(--disp);font-weight:600;letter-spacing:.28em;font-size:13px;text-transform:uppercase;padding-left:.28em}
/* actions register (light) */
.wtag{font-family:var(--mono);font-size:10px;color:var(--mute);border:1px solid var(--line);border-radius:6px;padding:2px 8px;white-space:nowrap}
.wtag.cl{color:var(--f-600);background:var(--f-50);border-color:rgba(56,153,107,.25)}
.mchip.lt{border-color:var(--line);color:var(--mute)}
.mchip.lt:hover{color:var(--ink);background:var(--grey-50)}
.mchip.lt.on{color:var(--f-600);border-color:rgba(56,153,107,.4);background:var(--f-50)}
.afilter{display:flex;gap:7px}
.dchip{font-family:var(--mono);font-size:10px;letter-spacing:.03em;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.05);color:var(--sil-3);white-space:nowrap}
.dchip.neg{color:var(--red-txt);background:rgba(180,85,63,.14)}
.dchip.due{color:var(--sil-1);background:rgba(255,255,255,.1)}
.dchip.lt{background:var(--grey-100);color:var(--mute)}
.dchip.lt.neg{color:var(--red);background:rgba(180,85,63,.1)}
.dchip.lt.due{color:var(--ink);background:var(--grey-200)}
.loglist{max-height:520px;overflow-y:auto}
.logrow{display:flex;gap:14px;padding:13px 20px;border-bottom:1px solid var(--line-2)}
.logrow:last-child{border-bottom:none}
.logrow .logd{font-family:var(--mono);font-size:10px;color:var(--f-600);width:44px;flex:0 0 auto;padding-top:2px}
.logrow .logn{font-size:12.5px;color:var(--ink-2);line-height:1.5}
.logrow .logmeta{font-family:var(--mono);font-size:9.5px;color:var(--faint);margin-top:4px}
/* today cockpit (dark) */
.alh,.arow{display:grid;grid-template-columns:1fr 2.6fr .8fr 1fr 1fr .9fr;gap:12px;align-items:center;padding:12px 20px}
.alh{border-bottom:1px solid var(--steel);font-family:var(--mono);font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--sil-4)}
.arow{border-top:1px solid rgba(198,205,207,.07);cursor:pointer;transition:background .12s}
.arow:hover{background:rgba(255,255,255,.03)}
.arow .aref{font-family:var(--mono);font-size:11px;color:var(--f-300);display:flex;flex-direction:column;gap:3px}
.arow .atype{font-family:var(--mono);font-size:8.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--sil-4)}
.arow .at{font-size:13px;color:var(--sil-1);font-weight:450}
.arow .ap{font-family:var(--mono);font-size:9.5px;color:var(--sil-4);margin-top:3px}
.arow .await{font-size:12px;color:var(--sil-3)}
.arow .alast{font-size:11px;color:var(--sil-4)}
.cadgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.cadcard{border:1px solid var(--steel-2);border-radius:14px;background:linear-gradient(180deg,#111615,#0a0d0c);padding:16px 18px;cursor:pointer;transition:transform .14s var(--ease),border-color .2s}
.cadcard:hover{transform:translateY(-2px);border-color:rgba(111,190,150,.35)}
.cadcard.now{border-color:rgba(111,190,150,.5);background:linear-gradient(180deg,#0f1a15,#0a0d0c)}
.cadtop{display:flex;align-items:center;justify-content:space-between}
.cadfreq{font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--sil-4)}
.cadwhen{font-family:var(--mono);font-size:10px;color:var(--sil-3)}
.cadnow{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--f-300);background:rgba(35,122,82,.14);border:1px solid rgba(111,190,150,.3);padding:2px 8px;border-radius:20px}
.cadlabel{font-family:var(--disp);font-weight:600;font-size:14px;color:#fff;margin-top:12px;letter-spacing:-.01em}

const MILESTONES=['Contract executed','Design development complete','Construction documentation issued','Building permit issued','Site possession','Construction commenced','Structure complete','Lock-up','Practical completion','Final completion & handover'];
function buildProgramme(p,doneCount,lateIdx){
 const start=p.contractDate?new Date(p.contractDate):null;
 const end=p.pc?new Date(p.pc):null;const n=MILESTONES.length;
 return MILESTONES.map((nm,i)=>{
  let state='upcoming';
  if(i<doneCount)state='done';else if(i===doneCount)state='active';
  if(lateIdx!=null&&i===lateIdx)state='late';
  let date='TBC';
  if(start&&end){const t=start.getTime()+(end.getTime()-start.getTime())*(i/(n-1));date=new Date(t).toISOString().slice(0,10);}
  return {name:nm,state,date};

function toast(msg){const t=$('#toast');$('#toasttx').textContent=msg;t.classList.add('on');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('on'),2600);}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ============ RENDER: TOPNAV + RAIL ============ */
/* Senior Management is director-only. When embedded for a consultant (?role=consultant)
   the module is stripped from both nav bars and its route is blocked. */
const CONSULT = new URLSearchParams(location.search).get('role')==='consultant';
const MODULES=[['today','Today'],['management','Senior Mgmt'],['portfolio','Portfolio'],['projects','Projects'],['feasibility','Feasibility'],['accounts','Accounts'],['meetings','Meetings']].filter(m=>!(CONSULT&&m[0]==='management'));
function topOn(k){const c=route.view;
 if(k==='today')return c==='today';
 if(k==='management')return c==='management';
 if(k==='portfolio')return c==='portfolio';
 if(k==='projects')return c==='projects'||c==='project'||c==='newproject';
 return c==='module'&&route.pid===k;}
function renderTopnav(){
 $('#topnav').innerHTML=MODULES.map(m=>`<button class="${topOn(m[0])?'on':''}" data-mod="${m[0]}">${m[1]}</button>`).join('');
 $('#topnav').querySelectorAll('button').forEach(b=>b.onclick=()=>{const m=b.dataset.mod;if(m==='portfolio')go('portfolio');else if(m==='projects')go('projects');else if(m==='management')go('management');else if(m==='today')go('today');else if(m==='meetings')go('meetings');else go('module',m);});
}
function renderRail(){
 const active=(route.view==='project'||route.view==='projects'||route.view==='newproject');
 const open=clOpenAll();
 let html=`<div class="railbrand"><span class="dev" style="width:18px">${apexMark('rl')}</span><span class="railwm sil-txt">ATRIUM</span></div>`;
 html+=`<div class="grp">Project Management</div>`;
 html+=railItem('today','today','Today',null);
 if(!CONSULT) html+=railItem('management','sm','Senior Management',null);
 html+=railItem('portfolio','portfolio','Portfolio',null);
 html+=railItem('projects','projects','Projects',PROJECTS.length);
 html+=`<button class="newbtn" id="railnew">${plus()}<span>New Project</span></button>`;
 html+=`<div class="grp">External</div>`;
 html+=railItem('portal','portal','Client Portal',null);
 html+=`<div class="grp">Platform</div>`;
 html+=railItem('feasibility','feas','Feasibility',null,true);
 html+=railItem('accounts','acct','Accounts',null,true);
 html+=railItem('meetings','meet','Meetings',null,true);
 html+=`<div class="railfoot">ATRIUM v3.0<br>Carbon · silver · racing green<br>The home that arrives.</div>`;
 const r=$('#rail');r.innerHTML=html;
 r.querySelectorAll('[data-nav]').forEach(el=>el.onclick=()=>{const v=el.dataset.nav;if(v==='portfolio')go('portfolio');else if(v==='projects')go('projects');else if(v==='management')go('management');else if(v==='today')go('today');else if(v==='portal')go('portal',defaultPortalPid());else if(v==='meetings')go('meetings');else go('module',v);});
 $('#railnew').onclick=()=>go('newproject');

function clOpenAll(){let d=0;PROJECTS.forEach(p=>{const c=clDone(p);d+=c.t-c.d;});return d;}
function railItem(nav,ic,label,ct,muted){
 let on=(nav==='today'&&route.view==='today')||(nav==='management'&&route.view==='management')||(nav==='portal'&&route.view==='portal')||(nav==='portfolio'&&route.view==='portfolio')||(nav==='projects'&&(route.view==='projects'||route.view==='project'||route.view==='newproject'))||(route.view==='module'&&route.pid===nav);
 return `<button class="navitem ${on?'on':''}" data-nav="${nav}">${icon(ICONS[ic])}<span class="tx">${label}</span>${ct!=null?`<span class="ct">${ct}</span>`:''}</button>`;
}
function plus(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="15" height="15"><path d="M12 5v14M5 12h14"/></svg>';}
function livery(){return '<span class="livery"><i class="g"></i><i class="s"></i></span>';}

/* ============ VIEWS ============ */
function go(view,pidOrTab,tab){
 if(CONSULT&&view==='management'){view='today';} // Senior Management is director-only
 if(view==='project'){route={view:'project',pid:pidOrTab,tab:tab||'overview'};}
 else if(view==='module'){route={view:'module',pid:pidOrTab,tab:null};}
 else if(view==='portal'){route={view:'portal',pid:pidOrTab,tab:null};}
 else if(view==='meeting'){route={view:'meeting',pid:pidOrTab,tab:null};}
 else route={view,pid:null,tab:null};
 window.scrollTo(0,0);$('#main').scrollTop=0;render();
}
function render(){
 persist();
 renderTopnav();renderRail();
 const main=$('#main');
 if(route.view==='project'){renderProject();return;}
 main.innerHTML='<div class="page" id="page"></div>'; // rebuild (project view replaces #main wholesale)
 const page=$('#page');
 if(route.view==='portfolio'){main.className=surf();page.innerHTML=viewPortfolio();bindPortfolio();}
 else if(route.view==='today'){main.className=surf();page.innerHTML=viewToday();bindToday();}
 else if(route.view==='management'){main.className=surf();page.innerHTML=viewManagement();bindManagement();}
 else if(route.view==='portal'){main.className=surf();page.innerHTML=viewPortal(route.pid);bindPortal();}
 else if(route.view==='projects'){main.className=surf();page.innerHTML=viewProjectsList();bindProjectsList();}
 else if(route.view==='newproject'){main.className='main light';page.innerHTML=viewWizard();bindWizard();}
 else if(route.view==='meetings'){main.className=surf();page.innerHTML=viewMeetings();bindMeetings();}
 else if(route.view==='meeting'){main.className=surf();page.innerHTML=viewMeeting(route.pid);bindMeeting();}
 else if(route.view==='module'){main.className=surf();page.innerHTML=viewModuleStub(route.pid);}
 else if(route.view==='project'){renderProject();}
}

function ring(pct){const r=42,C=2*Math.PI*r,off=C*(1-pct/100);
 return `<div class="ring"><svg width="96" height="96" viewBox="0 0 96 96">
  <circle cx="48" cy="48" r="${r}" fill="none" stroke="#E7EAE9" stroke-width="8"/>
  <circle cx="48" cy="48" r="${r}" fill="none" stroke="url(#rg)" stroke-width="8" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}"/>
  <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1B5E3F"/><stop offset="1" stop-color="#6FBE96"/></linearGradient></defs></svg>
  <div class="rt"><div class="rv">${pct}%</div><div class="rl">SETUP</div></div></div>`;
}

/* shared metric helpers */
function varMoney(n){return (n<0?'−':'+')+money(Math.abs(Math.round(n)));}
function schedInline(n){return n<0?`<span class="neg">${n}d behind</span>`:(n>0?`<span class="pos">+${n}d ahead</span>`:'on programme');}
function cvInline(cv){return cv<0?`<span class="neg">${varMoney(cv)} over</span>`:`<span class="pos">${varMoney(cv)} under</span>`;}
function schedSnap(n){return `<span class="sv mono ${n<0?'neg':(n>0?'pos':'')}">${n===0?'On time':(n>0?'+'+n:n)+' days'}</span>`;}
function cvSnap(cv){return `<span class="sv mono ${cv<0?'neg':'pos'}">${varMoney(cv)}</span>`;}
function schedBig(n){return n===0?'On time':(n>0?'+'+n+'d':n+'d');}
function pill4(tab,label,value,desc,pct){return `<div class="pill4" data-ptab="${tab}"><div class="bz"></div><div class="k">${label}</div><div class="v">${value}</div><div class="d">${desc}</div><div class="bar"><i style="width:${pct}%"></i></div></div>`;}
function pill4mini(label,value,desc,pct,neg){return `<div class="pill4" style="cursor:default"><div class="bz"></div><div class="k">${label}</div><div class="v" style="${neg?'color:var(--red)':''}">${value}</div><div class="d">${desc}</div>${pct!=null?`<div class="bar"><i style="width:${pct}%"></i></div>`:''}</div>`;}
function qKpi(label,value,desc,neg){return `<div class="pill4" style="cursor:default"><div class="bz"></div><div class="k">${label}</div><div class="v" style="${neg?'color:var(--red)':''}">${value}</div><div class="d">${desc}</div></div>`;}
function cvKpi(cv){const neg=cv<0;return `<div class="pill4" style="cursor:default"><div class="bz"></div><div class="k">Cost variance</div><div class="v" style="color:${neg?'var(--red)':'var(--f-600)'}">${varMoney(cv)}</div><div class="d">${neg?'forecast over budget':'forecast under budget'}</div></div>`;}

/* ---- Client portal (developer view) ---- */
function shortClient(n){return n.replace(/\s+Pty Ltd$/i,'');}
function clientList(){const map={};PROJECTS.forEach(p=>{if(!map[p.principal])map[p.principal]={principal:p.principal,rep:p.rep,pid:p.id,internal:/7EVEN/i.test(p.principal)};});return Object.values(map);}
function defaultPortalPid(){const c=clientList().find(x=>!x.internal);return c?c.pid:PROJECTS[0].id;}
function viewPortal(pid){
 const src=PROJECTS.find(p=>p.id===pid)||PROJECTS[0];
 const principal=src.principal,rep=src.rep;
 const projs=PROJECTS.filter(p=>p.principal===principal);

function tabFiles(p){
 const gen=p.templatesGen;
 // map templates to folders for doc display
 function docsFor(folderName,subName){
  return TEMPLATES.filter(t=>{
   const dest=t[4];
   if(subName){return dest.includes(folderName.replace(/^\d+\.\s/,''))&&dest.includes(subName);}
   // top-level: dest starts with folderName and has no ' / ' OR matches folder w/o sub
   const base=folderName;
   if(dest===base)return true;
   if(dest.startsWith(base)&&!dest.includes('/'))return true;
   return false;
  });
 }
 const tree=FOLDERS.map((f,i)=>{
  const topDocs=docsFor(f.n,null);
  const subs=f.sub.map(s=>{
   const sd=TEMPLATES.filter(t=>t[4].includes(f.n.replace(/^\d+\.\s/,''))&&t[4].includes(s));
   return {name:s,docs:sd};
  });
  const totalDocs=topDocs.length+subs.reduce((a,s)=>a+s.docs.length,0);
  const auto=(i===0);// open first
  let inner='';
  subs.forEach(s=>{
   inner+=`<div class="folder subfolder"><div class="frow" data-sub="1"><span style="width:26px"></span>${SVG.folder}<span class="fname" style="font-size:12.5px">${esc(s.name)}</span><span class="fmeta">${s.docs.length?s.docs.length+' file'+(s.docs.length>1?'s':''):'—'}</span></div>`;
   if(s.docs.length){inner+='<div class="fchildren" style="display:block;padding-left:20px">'+s.docs.map(d=>docRow(d,p,gen)).join('')+'</div>';}
   inner+='</div>';
  });
  topDocs.forEach(d=>inner+=docRow(d,p,gen));
  if(!inner)inner='<div class="doc" style="opacity:.5"><span class="dn" style="color:#b9c0c0">Empty — ready for project content</span></div>';
  return `<div class="folder ${auto?'open':''}" data-f="${i}"><div class="frow" data-folder="${i}">${SVG.chev}<span class="fnum">${f.n.match(/^\d+/)[0]}</span>${SVG.folder}<span class="fname">${esc(f.n.replace(/^\d+\.\s/,''))}</span><span class="fmeta">${totalDocs?totalDocs+' template'+(totalDocs>1?'s':''):(f.sub.length?f.sub.length+' subfolder'+(f.sub.length>1?'s':''):'—')}</span></div><div class="fchildren">${inner}</div></div>`;
 }).join('');
 return `<div class="sec">${livery()}<h2>Filing structure</h2><div class="rt"><span class="mono" style="font-size:11px;color:var(--mute)">Mirrors SharePoint · ${FOLDERS.length} folders</span></div></div>
  <div class="panel"><div class="ph"><h3>${esc(p.name)} — project root</h3><div class="rt">${gen?'<span class="st-tag st-ready">Templates filed</span>':'<span class="st-tag st-drafted">Structure ready</span>'}</div></div>
   <div class="tree">${tree}</div></div>
  ${!gen?`<p class="mono" style="font-size:10.5px;color:var(--mute);margin-top:12px;text-align:center">Populate templates (Templates tab) to file stamped documents into these folders automatically.</p>`:''}`;
}
function docRow(d,p,gen){
 const fn=d[6]?`${p.datePrefix}-Haavn.${d[6]}`:'';
 const label=gen&&d[6]?fn:(d[2]+' ['+(d[3])+']');
 return `<div class="doc">${SVG.doc}<span class="dn">${esc(label)}</span><span class="dt">${gen?'filed':'template'}</span></div>`;
}

  fr.closest('.folder').classList.toggle('open');
 });
}

function runProvision(proj){
 const steps=[
  'Assigning Project ID '+proj.id,
  'Creating '+FOLDERS.length+'-folder filing structure',
  'Seeding 27-task setup checklist (A–I)',
  'Initialising programme & milestone schedule',
  'Opening financials, cost tracker & quality register',
  'Stamping '+TEMPLATES.length+' templates from Project Info',
  'Registering '+PMS[proj.pmKey].name+' on the Senior Mgmt scorecard'
 ];
 const ov=$('#prov');const list=$('#provlist');
 list.innerHTML=steps.map((s,i)=>`<div class="provrow" data-i="${i}"><span class="pm"></span><span>${s}</span></div>`).join('');
 ov.classList.add('on');
 let i=0;
 function step(){
  const rows=list.querySelectorAll('.provrow');
  if(i>0){rows[i-1].querySelector('.pm').innerHTML=SVG.chk;}
  if(i<steps.length){
   rows[i].classList.add('on');rows[i].querySelector('.pm').innerHTML='<span class="spin"></span>';
   // mark previous done
   for(let k=0;k<i;k++){rows[k].classList.add('on');}
   i++;setTimeout(step,i===1?420:560);
  }else{
   setTimeout(()=>{
    ov.classList.remove('on');
    PROJECTS.unshift(proj);
    go('project',proj.id,'overview');
    toast(proj.name+' provisioned — '+FOLDERS.length+' folders, '+TEMPLATES.length+' templates ready.');
   },420);
  }
 }
 step();
}

/* ---- persistence (localStorage) + shared cloud sync (Supabase capital_kv) ----
   Every mutation re-renders, and render()/renderProject() call persist(), so all
   edits save. Non-blocking cloud: renders from localStorage first, still works
   offline; once the capital_kv table exists, edits fan out live to all staff.
   Same backend + discipline as the ATRIUM Accounts module. */
const SKEY='atrium_mgmt_v1';
const CLOUD_URL='https://vgvavmnqrdgcnledztyk.supabase.co';
const CLOUD_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZndmF2bW5xcmRnY25sZWR6dHlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NzIwODEsImV4cCI6MjA5OTU0ODA4MX0.hiWSzfEMXPJGs67iqiuB3hwJVxUO51uu2rygmA5wO10';
let _saveT=null,_lastJSON='';
function persist(){
 clearTimeout(_saveT);
 _saveT=setTimeout(()=>{
  const blob={projects:PROJECTS,meetings:MEETINGS,light:LIGHTMODE};
  const json=JSON.stringify(blob);
  if(json===_lastJSON) return;
  _lastJSON=json;
  try{ localStorage.setItem(SKEY,json); }catch(e){}
  Cloud.push(blob,json);
 },400);
}
function loadState(){
 try{ const raw=localStorage.getItem(SKEY); if(raw){ const s=JSON.parse(raw);
  if(Array.isArray(s.projects)&&s.projects.length) PROJECTS=s.projects;
  if(Array.isArray(s.meetings)) MEETINGS=s.meetings;
  if(typeof s.light==='boolean') LIGHTMODE=s.light; } }catch(e){}
}
function applyRemote(val){
 if(Array.isArray(val.projects)&&val.projects.length) PROJECTS=val.projects;
 if(Array.isArray(val.meetings)) MEETINGS=val.meetings;
 if(typeof val.light==='boolean'){ LIGHTMODE=val.light; setThemeBtn(); }
 try{ localStorage.setItem(SKEY,JSON.stringify(val)); }catch(e){}
 if(route.view==='project') renderProject(); else render();
}
const Cloud={ sb:null, ready:false, _last:'', _pushT:null, _emptyRemote:false,
 async init(){ try{
  const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
  this.sb = createClient(CLOUD_URL, CLOUD_ANON, { realtime:{ params:{ eventsPerSecond:5 } } });
  const ok = await this.pull(); if(!ok){ this.ready=false; return; }
  this.ready=true;
  if(this._emptyRemote){ this._last=''; this.push({projects:PROJECTS,light:LIGHTMODE}); }
  this.subscribe();
 }catch(e){ this.ready=false; } },
 async pull(){ try{
  const { data, error } = await this.sb.from('capital_kv').select('value').eq('key',SKEY).maybeSingle();
  if(error) return false;
  if(!data || data.value==null){ this._emptyRemote=true; return true; }
  this._last = JSON.stringify(data.value); applyRemote(data.value); return true;
 }catch(e){ return false; } },
 push(blob,json){ if(!this.ready||!this.sb) return; json=json||JSON.stringify(blob);
  if(json===this._last) return; this._last=json;
  clearTimeout(this._pushT);
  this._pushT=setTimeout(()=>{ this.sb.from('capital_kv').upsert({key:SKEY,value:blob,updated_at:new Date().toISOString()},{onConflict:'key'})
    .then(({error})=>{ if(error) console.warn('[atrium-mgmt] push',error.message); }); },250);
 },
 subscribe(){ this.sb.channel('atrium-mgmt-sync')
  .on('postgres_changes',{event:'*',schema:'public',table:'capital_kv',filter:'key=eq.'+SKEY},payload=>{
    const val=payload.new && payload.new.value; if(val==null) return;
    const json=JSON.stringify(val); if(json===this._last) return; this._last=json; applyRemote(val);
  }).subscribe();
 }
};
